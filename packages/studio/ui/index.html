<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameForge Studio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo"><span class="logo-f1">F</span><span class="logo-f2">F</span></span>
      <span class="header-title">FrameForge Studio</span>
      <span class="header-file" id="file-name">Loading...</span>
    </div>
    <div class="header-right">
      <button class="btn btn-render" id="btn-render">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Render MP4
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">
    <!-- Preview -->
    <div class="preview-container">
      <div class="preview-wrapper" id="preview-wrapper">
        <img id="preview-img" class="preview-img" alt="Frame preview" />
        <div class="preview-loading" id="preview-loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Frame info bar -->
    <div class="info-bar">
      <span id="info-frame">Frame 0 / 0</span>
      <span class="info-sep">·</span>
      <span id="info-time">0.00s / 0.00s</span>
      <span class="info-sep">·</span>
      <span id="info-fps">30 fps</span>
      <span class="info-sep">·</span>
      <span id="info-res">1920×1080</span>
      <span id="info-status" class="info-status"></span>
    </div>
  </main>

  <!-- Timeline -->
  <div class="timeline-section">
    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="btn-start" title="Go to start (Home)">⏮</button>
      <button class="ctrl-btn" id="btn-prev" title="Previous frame (←)">◀</button>
      <button class="ctrl-btn ctrl-play" id="btn-play" title="Play/Pause (Space)">▶</button>
      <button class="ctrl-btn" id="btn-next" title="Next frame (→)">▶</button>
      <button class="ctrl-btn" id="btn-end" title="Go to end (End)">⏭</button>
    </div>

    <!-- Timeline bar -->
    <div class="timeline" id="timeline">
      <div class="timeline-progress" id="timeline-progress"></div>
      <div class="timeline-handle" id="timeline-handle"></div>
      <div class="timeline-labels">
        <span>0:00</span>
        <span id="timeline-end">0:00</span>
      </div>
    </div>
  </div>

  <!-- Render overlay -->
  <div class="render-overlay" id="render-overlay">
    <div class="render-dialog">
      <h3>Rendering...</h3>
      <div class="render-progress-bar">
        <div class="render-progress-fill" id="render-progress-fill"></div>
      </div>
      <p class="render-status" id="render-status">Starting render...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
