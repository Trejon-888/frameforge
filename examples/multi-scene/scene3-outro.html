<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0f3460; font-family: system-ui; }
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }
    .cta { font-size: 56px; font-weight: 800; color: #ffffff; opacity: 0; }
    .url { font-size: 28px; color: #e94560; opacity: 0; }
    .bar { width: 0; height: 3px; background: linear-gradient(90deg, #e94560, #6366f1); }
  </style>
</head>
<body>
  <div class="center">
    <h1 class="cta">Get Started</h1>
    <div class="bar"></div>
    <p class="url">github.com/Trejon-888/frameforge</p>
  </div>
  <script>
    function update() {
      const t = performance.now() / 1000;
      const cta = document.querySelector('.cta');
      const bar = document.querySelector('.bar');
      const url = document.querySelector('.url');
      cta.style.opacity = Math.min(1, Math.max(0, (t - 0.3) / 0.6));
      bar.style.width = Math.min(500, Math.max(0, (t - 0.8) / 0.8 * 500)) + 'px';
      url.style.opacity = Math.min(1, Math.max(0, (t - 1.5) / 0.5));
      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
