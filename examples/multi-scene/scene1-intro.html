<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #1a1a2e; font-family: system-ui; }
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .title { font-size: 80px; font-weight: 800; color: #e94560; opacity: 0; }
    .sub { font-size: 32px; color: #ffffff; opacity: 0; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="center">
    <h1 class="title">FrameForge</h1>
    <p class="sub">Multi-Scene Composition</p>
  </div>
  <script>
    function update() {
      const t = performance.now() / 1000;
      const title = document.querySelector('.title');
      const sub = document.querySelector('.sub');
      title.style.opacity = Math.min(1, Math.max(0, (t - 0.3) / 0.8));
      sub.style.opacity = Math.min(1, Math.max(0, (t - 1.0) / 0.6));
      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
