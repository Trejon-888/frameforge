<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 40px;
    }

    /* --- CSS @keyframes animations --- */

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(60px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandBar {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
      50% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.8); }
    }

    @keyframes rotateIn {
      0% { opacity: 0; transform: rotate(-180deg) scale(0); }
      100% { opacity: 1; transform: rotate(0deg) scale(1); }
    }

    @keyframes colorShift {
      0% { color: #818cf8; }
      33% { color: #f472b6; }
      66% { color: #34d399; }
      100% { color: #818cf8; }
    }

    /* --- Elements --- */

    .title {
      font-size: 72px;
      font-weight: 800;
      color: white;
      animation: fadeSlideUp 1s ease-out 0.3s both;
    }

    .subtitle {
      font-size: 36px;
      font-weight: 300;
      animation: fadeSlideUp 1s ease-out 0.8s both, colorShift 3s linear 1.5s infinite;
    }

    .bar {
      width: 600px;
      height: 4px;
      background: linear-gradient(90deg, #818cf8, #f472b6);
      border-radius: 2px;
      transform-origin: left center;
      animation: expandBar 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.2s both;
    }

    .orbs {
      display: flex;
      gap: 40px;
      margin-top: 20px;
    }

    .orb {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      animation: rotateIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 pulseGlow 2s ease-in-out 2.5s infinite;
    }

    .orb:nth-child(1) {
      background: #818cf8;
      animation-delay: 1.8s, 2.8s;
    }
    .orb:nth-child(2) {
      background: #f472b6;
      animation-delay: 2.0s, 3.0s;
    }
    .orb:nth-child(3) {
      background: #34d399;
      animation-delay: 2.2s, 3.2s;
    }
    .orb:nth-child(4) {
      background: #fbbf24;
      animation-delay: 2.4s, 3.4s;
    }

    .footer {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.4);
      animation: fadeSlideUp 1s ease-out 3s both;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">CSS Animations</h1>
    <div class="bar"></div>
    <p class="subtitle">Pure CSS — no JavaScript animation code</p>
    <div class="orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>
    <p class="footer">Rendered by FrameForge</p>
  </div>
</body>
</html>
