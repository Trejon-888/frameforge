<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

    .scene {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 1;
      transition: background-color 0.01s;
    }

    /* Full-screen text */
    .mega-text {
      font-size: 220px; font-weight: 800; letter-spacing: -8px;
      line-height: 0.9; text-align: center; z-index: 3;
      opacity: 0; transform: scale(1.3);
    }

    .sub-text {
      font-size: 42px; font-weight: 700; text-align: center;
      margin-top: 20px; z-index: 3; opacity: 0;
    }

    .badge-text {
      font-family: 'Space Mono', monospace;
      font-size: 18px; font-weight: 700;
      background: #000; color: #fff;
      border: 2px solid #000; border-radius: 8px;
      padding: 8px 20px; margin-top: 30px;
      box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.3);
      z-index: 3; opacity: 0; text-transform: uppercase; letter-spacing: 3px;
    }

    /* CTA at end */
    .cta-block {
      position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%);
      z-index: 3; text-align: center; opacity: 0;
    }

    .cta-btn {
      display: inline-block;
      background: #000; color: #ffe17c;
      border: 3px solid #000; border-radius: 12px;
      padding: 20px 48px; font-size: 24px; font-weight: 800;
      box-shadow: 8px 8px 0px 0px #000;
      font-family: 'Space Mono', monospace;
    }

    .cta-url {
      font-family: 'Space Mono', monospace;
      font-size: 16px; color: #000; margin-top: 20px; font-weight: 700;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="mega-text" id="mega"></div>
    <div class="sub-text" id="sub"></div>
    <div class="badge-text" id="badge"></div>
  </div>
  <canvas id="fx" width="1080" height="1920"></canvas>
  <div class="cta-block" id="cta">
    <div class="cta-btn">npm i @frameforge/core</div>
    <div class="cta-url">frameforge.dev</div>
  </div>

  <script>
    // --- Particle System ---
    var canvas = document.getElementById('fx');
    var ctx = canvas.getContext('2d');
    var particles = [];

    function spawnBurst(x, y, color, count) {
      for (var i = 0; i < count; i++) {
        var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
        var speed = 300 + Math.random() * 500;
        var size = 6 + Math.random() * 14;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: size, color: color,
          life: 1, decay: 0.6 + Math.random() * 0.8
        });
      }
    }

    function updateParticles(dt) {
      ctx.clearRect(0, 0, 1080, 1920);
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= p.decay * dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        // Neo-Brutalist: square particles, no circles
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    // --- Scene Data ---
    var scenes = [
      { text: 'ANY', sub: '', bg: '#ffe17c', fg: '#000', dur: 0.8 },
      { text: 'FRAME\nWORK', sub: '', bg: '#ffe17c', fg: '#000', dur: 0.6 },
      { text: 'GSAP', sub: 'Professional Animation', bg: '#88ce02', fg: '#000', dur: 0.9 },
      { text: 'THREE\n.JS', sub: '3D WebGL', bg: '#049ef4', fg: '#fff', dur: 0.9 },
      { text: 'CSS', sub: '@keyframes', bg: '#264de4', fg: '#fff', dur: 0.9 },
      { text: 'D3.JS', sub: 'Data Visualization', bg: '#f68e45', fg: '#000', dur: 0.9 },
      { text: 'LOTTIE', sub: 'Motion Design', bg: '#00ddb3', fg: '#000', dur: 0.9 },
      { text: 'ANY.', sub: 'If a browser renders it...', bg: '#171e19', fg: '#ffe17c', dur: 1.2 },
    ];

    var totalDur = 0;
    var sceneStarts = [];
    for (var s = 0; s < scenes.length; s++) {
      sceneStarts.push(totalDur);
      totalDur += scenes[s].dur;
    }
    var ctaStart = totalDur;

    var lastSceneIdx = -1;
    var sceneEl = document.getElementById('scene');
    var megaEl = document.getElementById('mega');
    var subEl = document.getElementById('sub');
    var badgeEl = document.getElementById('badge');
    var ctaEl = document.getElementById('cta');

    // --- Spring easing ---
    function spring(t) {
      var c4 = (2 * Math.PI) / 3;
      return t <= 0 ? 0 : t >= 1 ? 1 :
        Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
    }
    function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    var prevTime = 0;

    function update() {
      var t = performance.now() / 1000;
      var dt = Math.min(t - prevTime, 0.05);
      prevTime = t;

      // Find current scene
      var sceneIdx = scenes.length - 1;
      for (var i = 0; i < scenes.length; i++) {
        if (t < sceneStarts[i] + scenes[i].dur) { sceneIdx = i; break; }
      }

      var sc = scenes[sceneIdx];
      var sceneT = t - sceneStarts[sceneIdx];
      var entryP = spring(Math.min(1, sceneT / 0.25));

      // Scene changed — trigger burst
      if (sceneIdx !== lastSceneIdx) {
        lastSceneIdx = sceneIdx;
        sceneEl.style.backgroundColor = sc.bg;
        megaEl.style.color = sc.fg;
        megaEl.innerHTML = sc.text.replace('\n', '<br>');
        subEl.style.color = sc.fg;
        subEl.textContent = sc.sub;
        subEl.style.opacity = sc.sub ? '0' : '0';
        badgeEl.style.opacity = '0';

        // Particle burst from center
        var burstColor = sc.fg === '#000' ? '#171e19' : '#ffe17c';
        spawnBurst(540, 960, burstColor, 30);
        spawnBurst(540, 960, sc.bg === '#ffe17c' ? '#b7c6c2' : '#fff', 15);
      }

      // Animate mega text — slam in with scale
      megaEl.style.opacity = entryP;
      megaEl.style.transform = 'scale(' + (1.3 - 0.3 * entryP) + ')';

      // Sub text fade
      if (sc.sub) {
        subEl.style.opacity = Math.min(1, Math.max(0, (sceneT - 0.2) / 0.2));
      }

      // CTA at end
      if (t >= ctaStart) {
        var ctaP = spring(Math.min(1, (t - ctaStart) / 0.5));
        ctaEl.style.opacity = ctaP;
        sceneEl.style.backgroundColor = '#ffe17c';
      }

      // Update particles
      updateParticles(dt);

      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
