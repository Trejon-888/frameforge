<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0a12; font-family: 'DM Sans', system-ui; }
    canvas#chart { position: absolute; top: 0; left: 0; z-index: 1; }
    canvas#grain { position: absolute; top: 0; left: 0; z-index: 10; mix-blend-mode: overlay; opacity: 0.08; pointer-events: none; }
    .content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

    .title-wrap {
      position: absolute; top: 80px; width: 100%; text-align: center;
    }
    .tag { font-size: 16px; font-weight: 700; color: #ffe17c; text-transform: uppercase; letter-spacing: 6px; opacity: 0; }
    .title { font-size: 72px; font-weight: 900; color: #fff; letter-spacing: -3px; margin-top: 8px; opacity: 0; }
    .title .accent { color: #ffe17c; }

    /* Stat counters */
    .stats {
      position: absolute; top: 1500px; width: 100%;
      display: flex; justify-content: center; gap: 20px;
    }
    .stat-card {
      width: 220px; padding: 20px; text-align: center;
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,225,124,0.15);
      border-radius: 12px; opacity: 0; transform: translateY(30px);
    }
    .stat-val { font-family: 'Space Mono'; font-size: 36px; font-weight: 700; color: #ffe17c; }
    .stat-lbl { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    .footer {
      position: absolute; bottom: 80px; width: 100%; text-align: center;
    }
    .footer-text { font-size: 20px; color: rgba(255,255,255,0.3); font-weight: 600; opacity: 0; }
    .footer-brand { font-size: 32px; font-weight: 900; margin-top: 8px; opacity: 0; }
    .footer-brand .f1 { color: #e94560; }
    .footer-brand .f2 { color: #6366f1; }
  </style>
</head>
<body>
  <canvas id="chart" width="1080" height="1920"></canvas>
  <canvas id="grain" width="1080" height="1920"></canvas>

  <div class="content">
    <div class="title-wrap">
      <div class="tag" id="tag">Data Visualization</div>
      <div class="title" id="title">Revenue by <span class="accent">Quarter</span></div>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card" id="st1"><div class="stat-val" id="sv1">0</div><div class="stat-lbl">Total Rev</div></div>
      <div class="stat-card" id="st2"><div class="stat-val" id="sv2">0</div><div class="stat-lbl">YoY Growth</div></div>
      <div class="stat-card" id="st3"><div class="stat-val" id="sv3">0</div><div class="stat-lbl">Best Quarter</div></div>
      <div class="stat-card" id="st4"><div class="stat-val" id="sv4">0</div><div class="stat-lbl">Avg/Quarter</div></div>
    </div>

    <div class="footer">
      <div class="footer-text" id="ft">Rendered by</div>
      <div class="footer-brand" id="fb"><span class="f1">Frame</span><span class="f2">Forge</span></div>
    </div>
  </div>

  <script>
    var chartC = document.getElementById('chart').getContext('2d');
    var grainC = document.getElementById('grain').getContext('2d');

    // Data
    var quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
    var values = [12, 18, 15, 24];
    var colors = ['#6366f1', '#e94560', '#10b981', '#ffe17c'];
    var maxVal = 28;
    var lineData = [8, 14, 11, 20]; // trend line

    // Chart geometry
    var chartLeft = 140;
    var chartRight = 940;
    var chartTop = 350;
    var chartBottom = 1350;
    var chartW = chartRight - chartLeft;
    var chartH = chartBottom - chartTop;
    var barW = 120;
    var barGap = (chartW - barW * 4) / 5;

    // Grain
    var grainFrame = 0;
    function renderGrain() {
      var img = grainC.createImageData(270, 480);
      var d = img.data;
      for (var i = 0; i < d.length; i += 4) { var v = Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      grainC.save(); grainC.scale(4,4); grainC.putImageData(img, 0, 0); grainC.restore();
    }

    function spring(t) {
      if (t<=0) return 0; if (t>=1) return 1;
      return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1;
    }
    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

    function lerp(a,b,t) { return a + (b-a)*t; }

    function drawChart(t) {
      chartC.clearRect(0, 0, 1080, 1920);

      // Background gradient
      var grd = chartC.createLinearGradient(0, 0, 0, 1920);
      grd.addColorStop(0, '#0a0a18');
      grd.addColorStop(0.5, '#0f0f1a');
      grd.addColorStop(1, '#0a0a12');
      chartC.fillStyle = grd;
      chartC.fillRect(0, 0, 1080, 1920);

      // Grid lines (fade in)
      var gridAlpha = ease(Math.min(1, (t - 0.8) / 0.5));
      if (gridAlpha > 0) {
        chartC.strokeStyle = 'rgba(255,255,255,' + (gridAlpha * 0.06) + ')';
        chartC.lineWidth = 1;
        for (var g = 0; g <= 5; g++) {
          var gy = chartBottom - (g/5) * chartH;
          chartC.beginPath(); chartC.moveTo(chartLeft, gy); chartC.lineTo(chartRight, gy); chartC.stroke();
        }

        // Y-axis labels
        chartC.fillStyle = 'rgba(255,255,255,' + (gridAlpha * 0.3) + ')';
        chartC.font = '500 14px "Space Mono"';
        chartC.textAlign = 'right';
        for (var g = 0; g <= 5; g++) {
          var gy = chartBottom - (g/5) * chartH;
          chartC.fillText('$' + (g * maxVal/5).toFixed(0) + 'M', chartLeft - 16, gy + 4);
        }
      }

      // Bars with spring animation
      for (var i = 0; i < 4; i++) {
        var barDelay = 1.5 + i * 0.3;
        var barP = spring(Math.min(1, Math.max(0, (t - barDelay) / 0.5)));
        var barH = (values[i] / maxVal) * chartH * barP;
        var barX = chartLeft + barGap + i * (barW + barGap);
        var barY = chartBottom - barH;

        // Bar shadow
        chartC.fillStyle = 'rgba(0,0,0,0.3)';
        chartC.fillRect(barX + 4, barY + 4, barW, barH);

        // Bar gradient
        var barGrd = chartC.createLinearGradient(barX, barY, barX, chartBottom);
        barGrd.addColorStop(0, colors[i]);
        barGrd.addColorStop(1, colors[i] + '88');
        chartC.fillStyle = barGrd;

        // Rounded top corners
        var r = 8;
        chartC.beginPath();
        chartC.moveTo(barX, chartBottom);
        chartC.lineTo(barX, barY + r);
        chartC.quadraticCurveTo(barX, barY, barX + r, barY);
        chartC.lineTo(barX + barW - r, barY);
        chartC.quadraticCurveTo(barX + barW, barY, barX + barW, barY + r);
        chartC.lineTo(barX + barW, chartBottom);
        chartC.closePath();
        chartC.fill();

        // Value label on top of bar
        if (barP > 0.5) {
          var labelAlpha = ease((barP - 0.5) * 2);
          chartC.fillStyle = 'rgba(255,255,255,' + labelAlpha + ')';
          chartC.font = '700 24px "Space Mono"';
          chartC.textAlign = 'center';
          chartC.fillText('$' + values[i] + 'M', barX + barW/2, barY - 16);
        }

        // Quarter label below
        var labelP = ease(Math.min(1, Math.max(0, (t - barDelay - 0.2) / 0.3)));
        chartC.fillStyle = 'rgba(255,255,255,' + (labelP * 0.5) + ')';
        chartC.font = '700 18px "DM Sans"';
        chartC.textAlign = 'center';
        chartC.fillText(quarters[i], barX + barW/2, chartBottom + 32);
      }

      // Trend line — draws with stroke-dashoffset style
      var lineDelay = 3.0;
      var lineP = ease(Math.min(1, Math.max(0, (t - lineDelay) / 0.8)));
      if (lineP > 0) {
        chartC.strokeStyle = '#ffe17c';
        chartC.lineWidth = 3;
        chartC.lineJoin = 'round';
        chartC.setLineDash([]);

        var points = [];
        for (var i = 0; i < 4; i++) {
          var px = chartLeft + barGap + i * (barW + barGap) + barW/2;
          var py = chartBottom - (lineData[i] / maxVal) * chartH;
          points.push({ x: px, y: py });
        }

        // Draw partial line based on lineP
        chartC.beginPath();
        var totalLen = 0;
        for (var i = 1; i < points.length; i++) {
          var dx = points[i].x - points[i-1].x;
          var dy = points[i].y - points[i-1].y;
          totalLen += Math.sqrt(dx*dx + dy*dy);
        }

        var drawLen = totalLen * lineP;
        var drawn = 0;
        chartC.moveTo(points[0].x, points[0].y);
        for (var i = 1; i < points.length; i++) {
          var dx = points[i].x - points[i-1].x;
          var dy = points[i].y - points[i-1].y;
          var segLen = Math.sqrt(dx*dx + dy*dy);
          if (drawn + segLen <= drawLen) {
            chartC.lineTo(points[i].x, points[i].y);
            drawn += segLen;
          } else {
            var frac = (drawLen - drawn) / segLen;
            chartC.lineTo(points[i-1].x + dx*frac, points[i-1].y + dy*frac);
            break;
          }
        }
        chartC.stroke();

        // Dots on line
        for (var i = 0; i < points.length; i++) {
          var dotDelay = lineDelay + 0.2 + i * 0.15;
          var dotP = spring(Math.min(1, Math.max(0, (t - dotDelay) / 0.3)));
          if (dotP > 0) {
            var dotSize = 8 * dotP;
            chartC.fillStyle = '#ffe17c';
            chartC.beginPath();
            chartC.arc(points[i].x, points[i].y, dotSize, 0, Math.PI*2);
            chartC.fill();
            // Glow
            chartC.fillStyle = 'rgba(255,225,124,0.2)';
            chartC.beginPath();
            chartC.arc(points[i].x, points[i].y, dotSize * 2.5, 0, Math.PI*2);
            chartC.fill();
          }
        }
      }

      // Axis lines
      var axisP = ease(Math.min(1, (t - 0.5) / 0.5));
      chartC.strokeStyle = 'rgba(255,255,255,' + (axisP * 0.2) + ')';
      chartC.lineWidth = 2;
      // Y axis
      chartC.beginPath();
      chartC.moveTo(chartLeft, chartTop);
      chartC.lineTo(chartLeft, chartBottom);
      chartC.stroke();
      // X axis
      chartC.beginPath();
      chartC.moveTo(chartLeft, chartBottom);
      chartC.lineTo(chartLeft + chartW * axisP, chartBottom);
      chartC.stroke();
    }

    var prevT = 0;
    function update() {
      var t = performance.now() / 1000;
      var dt = Math.min(t - prevT, 0.05);
      prevT = t;

      grainFrame++;
      if (grainFrame % 4 === 0) renderGrain();

      // Draw chart
      drawChart(t);

      // Title
      document.getElementById('tag').style.opacity = ease(Math.min(1, t / 0.4));
      var titleP = ease(Math.min(1, (t - 0.3) / 0.5));
      document.getElementById('title').style.opacity = titleP;

      // Stat counters (tick up)
      var statDelay = 4.0;
      var cards = [
        document.getElementById('st1'),
        document.getElementById('st2'),
        document.getElementById('st3'),
        document.getElementById('st4')
      ];
      var vals = [
        { el: document.getElementById('sv1'), target: 69, prefix: '$', suffix: 'M' },
        { el: document.getElementById('sv2'), target: 34, prefix: '+', suffix: '%' },
        { el: document.getElementById('sv3'), target: 24, prefix: '$', suffix: 'M' },
        { el: document.getElementById('sv4'), target: 17, prefix: '$', suffix: 'M' },
      ];

      for (var i = 0; i < 4; i++) {
        var sd = statDelay + i * 0.15;
        var sp = spring(Math.min(1, Math.max(0, (t - sd) / 0.4)));
        cards[i].style.opacity = sp;
        cards[i].style.transform = 'translateY(' + (30*(1-sp)) + 'px)';

        // Count up
        var countP = ease(Math.min(1, Math.max(0, (t - sd - 0.2) / 0.6)));
        var v = Math.round(vals[i].target * countP);
        vals[i].el.textContent = vals[i].prefix + v + vals[i].suffix;
      }

      // Footer
      document.getElementById('ft').style.opacity = ease(Math.min(1, Math.max(0, (t - 5.5) / 0.4)));
      document.getElementById('fb').style.opacity = ease(Math.min(1, Math.max(0, (t - 5.8) / 0.4)));

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
