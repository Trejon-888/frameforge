<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    canvas { position: absolute; top: 0; left: 0; z-index: 0; }
    .content { position: relative; z-index: 1; width: 100%; height: 100%; }

    /* Phase 1: Remotion fills screen */
    .remotion-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 160px; font-weight: 800; color: #000;
      letter-spacing: -6px; opacity: 0;
    }

    .strike {
      position: absolute; top: 50%; left: 100px; right: 100px;
      height: 12px; background: #ef4444; z-index: 5;
      transform: scaleX(0); transform-origin: left;
    }

    /* Phase 2: Limitations fly away */
    .limit-item {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 28px; font-weight: 700; color: #666;
      background: #f4f4f5; border: 2px dashed #ccc;
      padding: 14px 28px; border-radius: 10px;
      white-space: nowrap; opacity: 0;
    }

    /* Phase 3: FrameForge slams in */
    .ff-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1.5);
      font-size: 130px; font-weight: 800;
      letter-spacing: -4px; opacity: 0;
    }
    .ff-text .f1 { color: #e94560; }
    .ff-text .f2 { color: #6366f1; }

    /* Features */
    .features {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding-top: 200px;
    }

    .feat {
      width: 860px; display: flex; align-items: center; gap: 16px;
      background: #fff; border: 3px solid #000; border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 6px 6px 0px 0px #000;
      opacity: 0; transform: scale(0.8);
    }

    .feat-check {
      width: 36px; height: 36px; background: #22c55e;
      border: 2px solid #000; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff; font-weight: 800; flex-shrink: 0;
    }

    .feat-text { font-size: 22px; font-weight: 700; color: #000; }

    .feat-header {
      font-size: 52px; font-weight: 800; color: #000;
      text-align: center; opacity: 0; margin-bottom: 20px;
    }

    .cta-bottom {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      text-align: center; opacity: 0;
    }
    .cta-bottom .install {
      display: inline-block; background: #171e19; color: #ffe17c;
      border: 3px solid #000; border-radius: 12px;
      padding: 18px 44px; font-size: 22px; font-weight: 800;
      box-shadow: 8px 8px 0px 0px #000;
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <canvas id="bg" width="1080" height="1920"></canvas>
  <div class="content">
    <div class="remotion-text" id="remotion">Remotion</div>
    <div class="strike" id="strike"></div>

    <div class="limit-item" id="l1" style="top: 300px;">React only</div>
    <div class="limit-item" id="l2" style="top: 400px;">No GSAP / Three.js</div>
    <div class="limit-item" id="l3" style="top: 500px;">No Python</div>
    <div class="limit-item" id="l4" style="top: 600px;">Complex setup</div>

    <div class="ff-text" id="ff-text"><span class="f1">Frame</span><span class="f2">Forge</span></div>

    <div class="features" id="features" style="display:none;">
      <div class="feat-header" id="feat-header">Any Framework.</div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">Any HTML / CSS / JavaScript</div></div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">GSAP, Three.js, Lottie — native</div></div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">TypeScript + Python SDKs</div></div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">23 scene transitions</div></div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">MCP + AI Agent Skill</div></div>
      <div class="feat"><div class="feat-check">✓</div><div class="feat-text">Visual Studio with timeline</div></div>
    </div>

    <div class="cta-bottom" id="cta">
      <div class="install">npm i @frameforge/core</div>
    </div>
  </div>

  <script>
    var bgCanvas = document.getElementById('bg');
    var bgCtx = bgCanvas.getContext('2d');

    function spring(t) {
      var c4 = (2 * Math.PI) / 3;
      return t <= 0 ? 0 : t >= 1 ? 1 : Math.pow(2, -10*t) * Math.sin((t*10-0.75)*c4) + 1;
    }
    function ease(t) { return t < 0 ? 0 : t > 1 ? 1 : t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    var phase = 0;

    function update() {
      var t = performance.now() / 1000;

      // Background color transitions
      if (t < 3.5) {
        bgCtx.fillStyle = '#fff';
      } else if (t < 4.0) {
        var mix = (t - 3.5) / 0.5;
        var r = Math.round(255 - mix * (255 - 255));
        var g = Math.round(255 - mix * (255 - 225));
        var b = Math.round(255 - mix * (255 - 124));
        bgCtx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      } else {
        bgCtx.fillStyle = '#ffe17c';
      }
      bgCtx.fillRect(0, 0, 1080, 1920);

      // Phase 1: "Remotion" slams in (0-1.5s)
      var remotion = document.getElementById('remotion');
      if (t < 1.5) {
        var rp = spring(Math.min(1, t / 0.3));
        remotion.style.opacity = rp;
        remotion.style.transform = 'translate(-50%, -50%) scale(' + (1.3 - 0.3 * rp) + ')';
      }

      // Strike-through (1.2-1.8s)
      var strike = document.getElementById('strike');
      if (t > 1.2 && t < 3.5) {
        strike.style.transform = 'scaleX(' + ease(Math.min(1, (t-1.2)/0.3)) + ')';
      }

      // Limitations appear then fly off (1.5-3.0s)
      for (var i = 1; i <= 4; i++) {
        var lim = document.getElementById('l' + i);
        var ld = 1.5 + (i-1) * 0.2;
        if (t > ld && t < 3.0) {
          lim.style.opacity = ease(Math.min(1, (t-ld)/0.2));
        }
        // Fly off at 2.8s
        if (t > 2.8) {
          var fp = ease(Math.min(1, (t-2.8-i*0.05)/0.3));
          lim.style.transform = 'translateX(' + (-50 + fp * -1200) + '%)';
          lim.style.opacity = 1 - fp;
        }
      }

      // Remotion fades at 2.8s
      if (t > 2.8) {
        remotion.style.opacity = Math.max(0, 1 - ease((t-2.8)/0.3));
        strike.style.opacity = Math.max(0, 1 - ease((t-2.8)/0.3));
      }

      // Phase 2: FrameForge slams in (3.2-3.8s)
      var ffText = document.getElementById('ff-text');
      if (t > 3.2 && t < 4.5) {
        var fp2 = spring(Math.min(1, (t-3.2)/0.4));
        ffText.style.opacity = fp2;
        ffText.style.transform = 'translate(-50%, -50%) scale(' + (1.5 - 0.5 * fp2) + ')';
      }
      // FF text fades for features
      if (t > 4.2) {
        ffText.style.opacity = Math.max(0, 1 - ease((t-4.2)/0.3));
      }

      // Phase 3: Features (4.5s+)
      if (t > 4.3) {
        document.getElementById('features').style.display = 'flex';
        document.getElementById('feat-header').style.opacity = ease(Math.min(1, (t-4.5)/0.3));

        var feats = document.querySelectorAll('.feat');
        for (var j = 0; j < feats.length; j++) {
          var fd = 4.8 + j * 0.2;
          var fep = spring(Math.min(1, Math.max(0, (t-fd)/0.4)));
          feats[j].style.opacity = fep;
          feats[j].style.transform = 'scale(' + (0.8 + 0.2 * fep) + ')';
        }
      }

      // CTA
      document.getElementById('cta').style.opacity = spring(Math.min(1, Math.max(0, (t-6.5)/0.5)));

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
