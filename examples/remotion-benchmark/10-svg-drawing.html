<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#fafafa;font-family:'Inter',system-ui;color:#000}
canvas#grain{position:absolute;top:0;left:0;z-index:10;mix-blend-mode:multiply;opacity:0.025;pointer-events:none}
.scene{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}

svg{position:absolute;z-index:2}

/* The illustration: a camera icon made of clean geometric SVG paths */
.illustration{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%)}

.title{position:absolute;bottom:100px;width:100%;text-align:center;font-size:44px;font-weight:900;color:#000;letter-spacing:-2px;opacity:0;z-index:5}
.title .accent{color:#6366f1}

.sub{position:absolute;bottom:55px;width:100%;text-align:center;font-size:18px;color:rgba(0,0,0,0.4);opacity:0;z-index:5}

.tag{position:absolute;top:40px;left:50%;transform:translateX(-50%);font:700 13px system-ui;color:#6366f1;text-transform:uppercase;letter-spacing:4px;opacity:0;z-index:5}

.bg-dots{position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:radial-gradient(circle,rgba(0,0,0,0.06) 1px,transparent 1px);
  background-size:24px 24px;z-index:0}

/* SVG drawing animation via stroke-dasharray/dashoffset */
.draw-path{
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:var(--len);
  stroke-dashoffset:var(--len);
}
</style></head><body>
<div class="bg-dots"></div>
<canvas id="grain" width="1920" height="1080"></canvas>
<div class="scene">
  <div class="illustration">
    <svg width="900" height="700" viewBox="-150 -60 900 700">
      <!-- Construction guidelines (draw first, very light) -->
      <line class="draw-path" id="g1" x1="300" y1="-40" x2="300" y2="520"
        stroke="#ddd" stroke-width="1" stroke-dasharray="8 6" style="--len:560"/>
      <line class="draw-path" id="g2" x1="-20" y1="280" x2="620" y2="280"
        stroke="#ddd" stroke-width="1" stroke-dasharray="8 6" style="--len:640"/>
      <!-- Diagonal guides -->
      <line class="draw-path" id="g3" x1="50" y1="120" x2="550" y2="440"
        stroke="#eee" stroke-width="1" stroke-dasharray="6 8" style="--len:580"/>
      <line class="draw-path" id="g4" x1="550" y1="120" x2="50" y2="440"
        stroke="#eee" stroke-width="1" stroke-dasharray="6 8" style="--len:580"/>

      <!-- Camera body -->
      <rect class="draw-path" id="d1" x="50" y="120" width="500" height="320" rx="30"
        stroke="#000" stroke-width="4" style="--len:1700"/>

      <!-- Lens circle outer -->
      <circle class="draw-path" id="d2" cx="300" cy="290" r="120"
        stroke="#6366f1" stroke-width="4" style="--len:760"/>

      <!-- Lens circle inner -->
      <circle class="draw-path" id="d3" cx="300" cy="290" r="75"
        stroke="#6366f1" stroke-width="3" style="--len:475"/>

      <!-- Lens circle core -->
      <circle class="draw-path" id="d4" cx="300" cy="290" r="30"
        stroke="#e94560" stroke-width="3" style="--len:190"/>

      <!-- Flash bump -->
      <rect class="draw-path" id="d5" x="180" y="80" width="160" height="55" rx="12"
        stroke="#000" stroke-width="3" style="--len:420"/>

      <!-- Viewfinder -->
      <rect class="draw-path" id="d6" x="380" y="90" width="50" height="35" rx="6"
        stroke="#000" stroke-width="2.5" style="--len:165"/>

      <!-- Button -->
      <circle class="draw-path" id="d7" cx="480" cy="145" r="12"
        stroke="#e94560" stroke-width="3" style="--len:76"/>

      <!-- Grip lines -->
      <line class="draw-path" id="d8" x1="85" y1="200" x2="85" y2="380"
        stroke="#000" stroke-width="2" style="--len:180"/>
      <line class="draw-path" id="d9" x1="100" y1="200" x2="100" y2="380"
        stroke="#000" stroke-width="2" style="--len:180"/>

      <!-- Lens flare lines (crosshair style) -->
      <line class="draw-path" id="d10" x1="300" y1="140" x2="300" y2="165"
        stroke="#6366f1" stroke-width="2" style="--len:25"/>
      <line class="draw-path" id="d11" x1="300" y1="415" x2="300" y2="440"
        stroke="#6366f1" stroke-width="2" style="--len:25"/>
      <line class="draw-path" id="d12" x1="145" y1="290" x2="170" y2="290"
        stroke="#6366f1" stroke-width="2" style="--len:25"/>
      <line class="draw-path" id="d13" x1="430" y1="290" x2="455" y2="290"
        stroke="#6366f1" stroke-width="2" style="--len:25"/>

      <!-- Fill elements (appear after drawing) -->
      <circle id="fill1" cx="300" cy="290" r="28" fill="#e94560" opacity="0"/>
      <circle id="fill2" cx="300" cy="290" r="118" fill="none" stroke="#6366f1" stroke-width="1" opacity="0"/>
    </svg>
  </div>

  <div class="tag" id="tag">SVG Path Drawing</div>
  <div class="title" id="title">Illustrations that <span class="accent">draw themselves</span></div>
  <div class="sub" id="sub">stroke-dashoffset animation — pure SVG, no libraries needed</div>
</div>

<script>
var gc = document.getElementById('grain').getContext('2d');
var gf = 0;
function grain() {
  var img = gc.createImageData(480, 270);
  var d = img.data;
  for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  gc.save();gc.scale(4,4);gc.putImageData(img,0,0);gc.restore();
}

function ease(t){t=Math.max(0,Math.min(1,t));return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// Drawing schedule: each path draws over ~0.6s, staggered
var paths = [
  // Construction guidelines draw first (light, dashed)
  {id:'g1', start:0.1, dur:0.4},   // vertical center guide
  {id:'g2', start:0.15, dur:0.4},  // horizontal center guide
  {id:'g3', start:0.2, dur:0.35},  // diagonal 1
  {id:'g4', start:0.25, dur:0.35}, // diagonal 2
  // Camera body draws over the guides
  {id:'d1', start:0.5, dur:0.8},   // camera body
  {id:'d5', start:1.0, dur:0.4},   // flash bump
  {id:'d6', start:1.2, dur:0.3},   // viewfinder
  {id:'d2', start:1.4, dur:0.6},   // lens outer
  {id:'d3', start:1.8, dur:0.5},   // lens inner
  {id:'d4', start:2.2, dur:0.4},   // lens core
  {id:'d7', start:2.4, dur:0.3},   // button
  {id:'d8', start:2.6, dur:0.3},   // grip 1
  {id:'d9', start:2.7, dur:0.3},   // grip 2
  {id:'d10', start:2.9, dur:0.15}, // crosshair lines
  {id:'d11', start:2.95, dur:0.15},
  {id:'d12', start:3.0, dur:0.15},
  {id:'d13', start:3.05, dur:0.15},
];

function update() {
  var t = performance.now() / 1000;
  gf++; if(gf%5===0) grain();

  // Animate each path's stroke-dashoffset
  for (var i = 0; i < paths.length; i++) {
    var p = paths[i];
    var el = document.getElementById(p.id);
    if (!el) continue;
    var len = parseFloat(el.style.getPropertyValue('--len'));
    var progress = ease(Math.min(1, Math.max(0, (t - p.start) / p.dur)));
    el.style.strokeDashoffset = len * (1 - progress);
  }

  // Fill elements appear after drawing
  if (t > 2.8) {
    document.getElementById('fill1').style.opacity = ease(Math.min(1, (t-2.8)/0.3));
  }
  if (t > 3.0) {
    document.getElementById('fill2').style.opacity = ease(Math.min(1, (t-3.0)/0.3)) * 0.3;
  }

  // Fade out construction guides after camera is drawn
  if (t > 2.0) {
    var gFade = Math.min(1, (t-2.0)/0.8);
    ['g1','g2','g3','g4'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.opacity = 1 - gFade;
    });
  }

  // Tag
  document.getElementById('tag').style.opacity = ease(Math.min(1, t / 0.3));

  // Title + sub
  document.getElementById('title').style.opacity = ease(Math.min(1, (t-3.5)/0.5));
  document.getElementById('sub').style.opacity = ease(Math.min(1, (t-3.9)/0.4));

  requestAnimationFrame(update);
}
requestAnimationFrame(update);
</script></body></html>
