<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
    canvas { position: absolute; top: 0; left: 0; }
    #bg { z-index: 0; }
    #particles { z-index: 1; }
    #text { z-index: 2; }
    #overlay { z-index: 3; }
    #grain { z-index: 10; mix-blend-mode: overlay; opacity: 0.06; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="bg" width="1920" height="1080"></canvas>
  <canvas id="particles" width="1920" height="1080"></canvas>
  <canvas id="text" width="1920" height="1080"></canvas>
  <canvas id="overlay" width="1920" height="1080"></canvas>
  <canvas id="grain" width="1920" height="1080"></canvas>

  <script>
    var bgCtx = document.getElementById('bg').getContext('2d');
    var pCtx = document.getElementById('particles').getContext('2d');
    var tCtx = document.getElementById('text').getContext('2d');
    var oCtx = document.getElementById('overlay').getContext('2d');
    var gCtx = document.getElementById('grain').getContext('2d');

    // === TEXT TARGET POSITIONS ===
    // Render text to hidden canvas, sample pixel positions
    var textPixels = [];
    function sampleText(text, fontSize, offsetX, offsetY) {
      var tc = document.createElement('canvas');
      tc.width = 1920; tc.height = 1080;
      var ctx = tc.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.font = '900 ' + fontSize + 'px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 960 + offsetX, 540 + offsetY);
      var data = ctx.getImageData(0, 0, 1920, 1080).data;
      var points = [];
      // Sample every 6th pixel for density
      for (var y = 0; y < 1080; y += 6) {
        for (var x = 0; x < 1920; x += 6) {
          var idx = (y * 1920 + x) * 4;
          if (data[idx + 3] > 128) {
            points.push({ x: x, y: y });
          }
        }
      }
      return points;
    }

    var targetPoints = sampleText('FRAMEFORGE', 160, 0, -40);
    var subPoints = sampleText('Code your video. Frame by frame.', 36, 0, 80);

    // === PARTICLES ===
    var NUM = targetPoints.length + subPoints.length;
    var particles = [];

    for (var i = 0; i < NUM; i++) {
      var isMain = i < targetPoints.length;
      var target = isMain ? targetPoints[i] : subPoints[i - targetPoints.length];

      // Start from random positions around edges
      var edge = Math.random();
      var sx, sy;
      if (edge < 0.25) { sx = Math.random() * 1920; sy = -50; }
      else if (edge < 0.5) { sx = Math.random() * 1920; sy = 1130; }
      else if (edge < 0.75) { sx = -50; sy = Math.random() * 1080; }
      else { sx = 1970; sy = Math.random() * 1080; }

      particles.push({
        x: sx, y: sy,
        tx: target.x, ty: target.y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200,
        size: isMain ? (1.5 + Math.random() * 2) : (1 + Math.random() * 1.5),
        isMain: isMain,
        hue: isMain ? (0 + Math.random() * 30) : (220 + Math.random() * 40), // red-orange for main, blue for sub
        settled: false,
        delay: Math.random() * 1.5,
      });
    }

    // === FLOW FIELD (Perlin-like noise) ===
    // Simple noise using sin combinations
    function noise(x, y, t) {
      return Math.sin(x * 0.003 + t) * Math.cos(y * 0.004 - t * 0.7) +
             Math.sin((x + y) * 0.002 + t * 1.3) * 0.5 +
             Math.cos(x * 0.005 - y * 0.003 + t * 0.5) * 0.3;
    }

    // === GRAIN ===
    var gf = 0;
    function grain() {
      var img = gCtx.createImageData(480, 270);
      var d = img.data;
      for (var i = 0; i < d.length; i += 4) { var v = Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      gCtx.save(); gCtx.scale(4,4); gCtx.putImageData(img,0,0); gCtx.restore();
    }

    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

    /*
      Timeline (12s):
      0-1s:    Particles drift randomly with flow field
      1-4s:    Particles converge toward text positions
      4-6s:    Text fully formed, particles gently vibrate
      6-8s:    Subtitle particles converge
      8-10s:   Everything settled, ambient motion
      10-12s:  Particles scatter outward (explode), fade to black
    */

    var prevT = 0;

    function update() {
      var t = performance.now() / 1000;
      var dt = Math.min(t - prevT, 0.05);
      prevT = t;

      gf++; if (gf % 5 === 0) grain();

      // === BACKGROUND ===
      // Deep animated gradient
      var bgGrd = bgCtx.createRadialGradient(
        960 + Math.sin(t * 0.2) * 200, 540 + Math.cos(t * 0.15) * 100, 100,
        960, 540, 1200
      );
      bgGrd.addColorStop(0, '#1a0a2e');
      bgGrd.addColorStop(0.4, '#0a0a1a');
      bgGrd.addColorStop(1, '#050508');
      bgCtx.fillStyle = bgGrd;
      bgCtx.fillRect(0, 0, 1920, 1080);

      // Flow field visualization (subtle background texture)
      bgCtx.globalAlpha = 0.02;
      for (var fx = 0; fx < 1920; fx += 40) {
        for (var fy = 0; fy < 1080; fy += 40) {
          var n = noise(fx, fy, t * 0.5);
          var angle = n * Math.PI * 2;
          bgCtx.strokeStyle = n > 0 ? '#6366f1' : '#e94560';
          bgCtx.lineWidth = 1;
          bgCtx.beginPath();
          bgCtx.moveTo(fx, fy);
          bgCtx.lineTo(fx + Math.cos(angle) * 15, fy + Math.sin(angle) * 15);
          bgCtx.stroke();
        }
      }
      bgCtx.globalAlpha = 1;

      // === PARTICLES ===
      pCtx.clearRect(0, 0, 1920, 1080);

      // Phase timing
      var convergeStart = 1.0;
      var subConvergeStart = 5.5;
      var explodeStart = 10.0;

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        var effectiveT = t - p.delay * 0.5;

        // Determine behavior phase
        var converging = false;
        var exploding = false;

        if (p.isMain && effectiveT > convergeStart) converging = true;
        if (!p.isMain && effectiveT > subConvergeStart) converging = true;
        if (t > explodeStart) { converging = false; exploding = true; }

        if (exploding) {
          // Scatter outward from center
          var dx = p.x - 960;
          var dy = p.y - 540;
          var dist = Math.sqrt(dx*dx + dy*dy) || 1;
          p.vx += (dx / dist) * 800 * dt;
          p.vy += (dy / dist) * 800 * dt;
        } else if (converging) {
          // Spring toward target
          var convergeP = p.isMain
            ? ease(Math.min(1, (effectiveT - convergeStart) / 2.5))
            : ease(Math.min(1, (effectiveT - subConvergeStart) / 2.0));

          var stiffness = 2.0 + convergeP * 6.0;
          var damping = 3.0 + convergeP * 4.0;

          var dx = p.tx - p.x;
          var dy = p.ty - p.y;
          p.vx += dx * stiffness * dt;
          p.vy += dy * stiffness * dt;
          p.vx *= (1 - damping * dt);
          p.vy *= (1 - damping * dt);

          // Ambient vibration when settled
          if (convergeP > 0.9) {
            p.vx += Math.sin(t * 3 + i * 0.1) * 5 * dt;
            p.vy += Math.cos(t * 2.5 + i * 0.15) * 5 * dt;
          }
        } else {
          // Free flow with noise field
          var n = noise(p.x, p.y, t);
          var angle = n * Math.PI * 2;
          p.vx += Math.cos(angle) * 60 * dt;
          p.vy += Math.sin(angle) * 60 * dt;
          p.vx *= 0.98;
          p.vy *= 0.98;

          // Gentle attraction toward center
          p.vx += (960 - p.x) * 0.1 * dt;
          p.vy += (540 - p.y) * 0.1 * dt;
        }

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        // Draw particle
        var alpha = exploding ? Math.max(0, 1 - (t - explodeStart) / 1.5) : 1;
        if (alpha <= 0) continue;

        var hue = p.hue + Math.sin(t + i * 0.01) * 10;
        var sat = p.isMain ? 85 : 70;
        var light = p.isMain ? 65 : 55;

        pCtx.fillStyle = 'hsla(' + hue + ',' + sat + '%,' + light + '%,' + (alpha * 0.9) + ')';
        pCtx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);

        // Glow for main particles
        if (p.isMain && alpha > 0.5) {
          pCtx.fillStyle = 'hsla(' + hue + ',' + sat + '%,' + light + '%,' + (alpha * 0.1) + ')';
          pCtx.fillRect(p.x - p.size*2, p.y - p.size*2, p.size*4, p.size*4);
        }
      }

      // === OVERLAY: Connection lines between nearby particles ===
      oCtx.clearRect(0, 0, 1920, 1080);
      if (t > 3.0 && t < 10.0) {
        var lineAlpha = Math.min(0.06, ease(Math.min(1, (t-3)/1.0)) * 0.06);
        if (t > 9.0) lineAlpha *= (10 - t);
        oCtx.strokeStyle = 'rgba(233, 69, 96, ' + lineAlpha + ')';
        oCtx.lineWidth = 1;
        // Only check main particles for performance, sample every 8th
        for (var i = 0; i < targetPoints.length; i += 8) {
          for (var j = i + 8; j < targetPoints.length; j += 8) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = dx*dx + dy*dy;
            if (dist < 3000) {
              oCtx.beginPath();
              oCtx.moveTo(particles[i].x, particles[i].y);
              oCtx.lineTo(particles[j].x, particles[j].y);
              oCtx.stroke();
            }
          }
        }
      }

      // === TEXT OVERLAY (subtle shadow text behind particles) ===
      tCtx.clearRect(0, 0, 1920, 1080);
      if (t > 3.0 && t < 10.5) {
        var textA = ease(Math.min(1, (t-3.5)/1.0));
        if (t > 9.5) textA *= Math.max(0, (10.5 - t));
        tCtx.globalAlpha = textA * 0.06;
        tCtx.fillStyle = '#fff';
        tCtx.font = '900 160px system-ui, sans-serif';
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';
        tCtx.fillText('FRAMEFORGE', 960, 500);
        tCtx.globalAlpha = 1;
      }

      // Watermark
      if (t > 8 && t < 10.5) {
        var wmA = ease(Math.min(1, (t-8.5)/0.5));
        if (t > 10) wmA *= Math.max(0, (10.5-t)*2);
        oCtx.globalAlpha = wmA * 0.15;
        oCtx.fillStyle = '#fff';
        oCtx.font = '400 14px system-ui';
        oCtx.textAlign = 'center';
        oCtx.fillText('Generative canvas particles — impossible in React-only frameworks', 960, 1040);
        oCtx.globalAlpha = 1;
      }

      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
