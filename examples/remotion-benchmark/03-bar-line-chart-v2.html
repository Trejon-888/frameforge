<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0F0F1A; font-family: 'Inter', system-ui; }
    canvas#main { position: absolute; top: 0; left: 0; z-index: 1; }
    canvas#grain { position: absolute; top: 0; left: 0; z-index: 10; mix-blend-mode: overlay; opacity: 0.05; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="main" width="1920" height="1080"></canvas>
  <canvas id="grain" width="1920" height="1080"></canvas>

  <script>
    var c = document.getElementById('main').getContext('2d');
    var gc = document.getElementById('grain').getContext('2d');

    // Data
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    var revenue = [8, 12, 10, 15, 18, 22];
    var conversion = [2.1, 2.8, 2.5, 3.2, 3.8, 4.2];
    var maxRev = 26, maxConv = 5.0;

    // Layout
    var CL = 180, CR = 1740, CT = 180, CB = 880;
    var CW = CR - CL, CH = CB - CT;
    var barW = 110, barGap = (CW - barW * 6) / 7;

    function spring(t) { if(t<=0)return 0;if(t>=1)return 1;return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1; }
    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
    function lerp(a,b,t) { return a+(b-a)*t; }

    // Animated gradient bg colors
    function hexToRgb(hex) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    var gf = 0;
    function grain() {
      var img = gc.createImageData(480, 270);
      var d = img.data;
      for (var i = 0; i < d.length; i += 4) { var v = Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      gc.save(); gc.scale(4,4); gc.putImageData(img, 0, 0); gc.restore();
    }

    function draw(t) {
      // Background with subtle animated gradient
      var grd = c.createRadialGradient(960 + Math.sin(t*0.3)*100, 400, 200, 960, 540, 900);
      grd.addColorStop(0, '#1a1a3e');
      grd.addColorStop(0.5, '#12122a');
      grd.addColorStop(1, '#0a0a18');
      c.fillStyle = grd;
      c.fillRect(0, 0, 1920, 1080);

      // Ambient glow behind chart area
      var glowA = ease(Math.min(1, (t-0.5)/1.0));
      c.fillStyle = 'rgba(99, 102, 241, ' + (glowA * 0.03) + ')';
      c.beginPath();
      c.ellipse(960, 600, 700, 400, 0, 0, Math.PI*2);
      c.fill();

      // Title
      var titleA = ease(Math.min(1, t/0.5));
      c.fillStyle = 'rgba(255,255,255,' + titleA + ')';
      c.font = '800 42px "Inter"';
      c.textAlign = 'left';
      c.fillText('Monthly Revenue & Conversion', CL, 80);
      c.fillStyle = 'rgba(255,255,255,' + (titleA * 0.35) + ')';
      c.font = '400 16px "Inter"';
      c.fillText('Jan – Jun 2026  ·  USD thousands  ·  % conversion rate', CL, 112);

      // Legend
      c.fillStyle = 'rgba(99,102,241,' + titleA + ')';
      c.fillRect(CR - 300, 68, 14, 14);
      c.fillStyle = 'rgba(255,255,255,' + (titleA*0.6) + ')';
      c.font = '500 14px "Inter"';
      c.textAlign = 'left';
      c.fillText('Revenue ($K)', CR - 280, 80);

      c.fillStyle = 'rgba(56,189,248,' + titleA + ')';
      c.beginPath(); c.arc(CR - 100, 75, 5, 0, Math.PI*2); c.fill();
      c.fillStyle = 'rgba(255,255,255,' + (titleA*0.6) + ')';
      c.fillText('CVR (%)', CR - 88, 80);

      // Grid lines with animation
      var gridA = ease(Math.min(1, (t-0.3)/0.6));
      for (var g = 0; g <= 5; g++) {
        var gy = CB - (g/5) * CH;
        c.strokeStyle = 'rgba(255,255,255,' + (gridA * 0.04) + ')';
        c.lineWidth = 1;
        c.beginPath(); c.moveTo(CL, gy); c.lineTo(CR, gy); c.stroke();

        // Left Y labels
        c.fillStyle = 'rgba(255,255,255,' + (gridA * 0.25) + ')';
        c.font = '500 12px "Space Mono"';
        c.textAlign = 'right';
        c.fillText('$' + Math.round(g * maxRev/5) + 'K', CL - 20, gy + 4);

        // Right Y labels
        c.fillStyle = 'rgba(56,189,248,' + (gridA * 0.3) + ')';
        c.textAlign = 'left';
        c.fillText((g * maxConv/5).toFixed(1) + '%', CR + 20, gy + 4);
      }

      // Bars with reflection
      for (var i = 0; i < 6; i++) {
        var bd = 0.8 + i * 0.12;
        var bp = spring(Math.min(1, Math.max(0, (t-bd)/0.45)));
        var bh = (revenue[i] / maxRev) * CH * bp;
        var bx = CL + barGap + i * (barW + barGap);
        var by = CB - bh;

        // Shadow/reflection below baseline
        var reflGrd = c.createLinearGradient(bx, CB, bx, CB + 40);
        reflGrd.addColorStop(0, 'rgba(99,102,241,0.08)');
        reflGrd.addColorStop(1, 'rgba(99,102,241,0)');
        c.fillStyle = reflGrd;
        c.fillRect(bx, CB, barW, 40 * bp);

        // Bar body with rich gradient
        var barGrd = c.createLinearGradient(bx, by, bx + barW, CB);
        barGrd.addColorStop(0, '#818cf8');
        barGrd.addColorStop(0.4, '#6366f1');
        barGrd.addColorStop(1, '#4f46e5');
        c.fillStyle = barGrd;

        // Rounded top
        var r = 8;
        c.beginPath();
        c.moveTo(bx, CB);
        c.lineTo(bx, by + r);
        c.quadraticCurveTo(bx, by, bx + r, by);
        c.lineTo(bx + barW - r, by);
        c.quadraticCurveTo(bx + barW, by, bx + barW, by + r);
        c.lineTo(bx + barW, CB);
        c.closePath();
        c.fill();

        // Highlight strip on left edge
        c.fillStyle = 'rgba(255,255,255,0.08)';
        c.fillRect(bx, by + r, 3, bh - r);

        // Value label
        if (bp > 0.6) {
          var la = ease((bp - 0.6) * 2.5);
          // Background pill
          var valText = '$' + revenue[i] + 'K';
          c.font = '700 15px "Space Mono"';
          var tw = c.measureText(valText).width;
          c.fillStyle = 'rgba(99,102,241,' + (la * 0.9) + ')';
          c.beginPath();
          c.roundRect(bx + barW/2 - tw/2 - 10, by - 34, tw + 20, 26, 6);
          c.fill();
          c.fillStyle = 'rgba(255,255,255,' + la + ')';
          c.textAlign = 'center';
          c.fillText(valText, bx + barW/2, by - 14);
        }

        // Month label
        c.fillStyle = 'rgba(255,255,255,' + (gridA * 0.4) + ')';
        c.font = '600 15px "Inter"';
        c.textAlign = 'center';
        c.fillText(months[i], bx + barW/2, CB + 30);
      }

      // Conversion line
      var ld = 1.8;
      var lp = ease(Math.min(1, Math.max(0, (t-ld)/1.2)));
      if (lp > 0) {
        var pts = [];
        for (var i = 0; i < 6; i++) {
          pts.push({
            x: CL + barGap + i * (barW + barGap) + barW/2,
            y: CB - (conversion[i] / maxConv) * CH
          });
        }

        // Wide glow
        c.strokeStyle = 'rgba(56,189,248,0.08)';
        c.lineWidth = 20;
        c.lineJoin = 'round'; c.lineCap = 'round';
        drawLine(c, pts, lp);

        // Medium glow
        c.strokeStyle = 'rgba(56,189,248,0.15)';
        c.lineWidth = 8;
        drawLine(c, pts, lp);

        // Core line
        c.strokeStyle = '#38bdf8';
        c.lineWidth = 3;
        drawLine(c, pts, lp);

        // Data points
        for (var i = 0; i < pts.length; i++) {
          var segP = i / (pts.length - 1);
          if (segP > lp) continue;
          var dp = spring(Math.min(1, Math.max(0, (t - ld - 0.1 - i*0.1)/0.3)));
          if (dp <= 0) continue;

          // Outer pulse
          var pulse = 1 + Math.sin(t * 3 + i * 1.2) * 0.3;
          c.fillStyle = 'rgba(56,189,248,0.08)';
          c.beginPath(); c.arc(pts[i].x, pts[i].y, 18 * pulse * dp, 0, Math.PI*2); c.fill();

          // Ring
          c.strokeStyle = 'rgba(56,189,248,' + (dp * 0.5) + ')';
          c.lineWidth = 2;
          c.beginPath(); c.arc(pts[i].x, pts[i].y, 10 * dp, 0, Math.PI*2); c.stroke();

          // Filled dot
          c.fillStyle = '#38bdf8';
          c.beginPath(); c.arc(pts[i].x, pts[i].y, 5 * dp, 0, Math.PI*2); c.fill();

          // White center
          c.fillStyle = '#fff';
          c.beginPath(); c.arc(pts[i].x, pts[i].y, 2 * dp, 0, Math.PI*2); c.fill();

          // Label with bg
          if (dp > 0.5) {
            var cla = ease((dp-0.5)*2);
            var cvText = conversion[i].toFixed(1) + '%';
            c.font = '700 12px "Space Mono"';
            var ctw = c.measureText(cvText).width;
            c.fillStyle = 'rgba(56,189,248,' + (cla * 0.2) + ')';
            c.beginPath();
            c.roundRect(pts[i].x - ctw/2 - 8, pts[i].y - 30, ctw + 16, 20, 4);
            c.fill();
            c.fillStyle = 'rgba(56,189,248,' + cla + ')';
            c.textAlign = 'center';
            c.fillText(cvText, pts[i].x, pts[i].y - 15);
          }
        }
      }

      // Summary stats at bottom
      var stats = [
        { label: 'TOTAL REVENUE', value: '$85K', color: '#6366f1' },
        { label: 'AVG GROWTH', value: '+34%', color: '#22c55e' },
        { label: 'PEAK CVR', value: '4.2%', color: '#38bdf8' },
        { label: 'BEST MONTH', value: 'June', color: '#f59e0b' },
      ];

      for (var i = 0; i < stats.length; i++) {
        var sd = 3.0 + i * 0.12;
        var sp = spring(Math.min(1, Math.max(0, (t-sd)/0.4)));
        if (sp <= 0) continue;

        var sx = CL + i * (CW / 4) + (CW / 8);
        var sy = 960;

        c.globalAlpha = sp;

        // Stat value
        c.fillStyle = stats[i].color;
        c.font = '800 32px "Inter"';
        c.textAlign = 'center';
        // Count-up effect
        var countP = ease(Math.min(1, Math.max(0, (t-sd)/0.8)));
        if (stats[i].value.startsWith('$')) {
          var num = parseInt(stats[i].value.replace(/\D/g,''));
          c.fillText('$' + Math.round(num * countP) + 'K', sx, sy);
        } else if (stats[i].value.startsWith('+')) {
          var num = parseInt(stats[i].value.replace(/\D/g,''));
          c.fillText('+' + Math.round(num * countP) + '%', sx, sy);
        } else if (stats[i].value.endsWith('%')) {
          var num = parseFloat(stats[i].value);
          c.fillText((num * countP).toFixed(1) + '%', sx, sy);
        } else {
          c.fillText(stats[i].value, sx, sy);
        }

        // Label
        c.fillStyle = 'rgba(255,255,255,0.3)';
        c.font = '600 11px "Inter"';
        c.fillText(stats[i].label, sx, sy + 20);

        c.globalAlpha = 1;
      }

      // Axes
      c.strokeStyle = 'rgba(255,255,255,' + (gridA * 0.1) + ')';
      c.lineWidth = 1;
      c.beginPath(); c.moveTo(CL, CT); c.lineTo(CL, CB); c.stroke();
      c.beginPath(); c.moveTo(CL, CB); c.lineTo(CR, CB); c.stroke();

      // Watermark
      var wmA = ease(Math.min(1, Math.max(0, (t-3.5)/0.4)));
      c.fillStyle = 'rgba(255,255,255,' + (wmA * 0.12) + ')';
      c.font = '400 12px "Space Mono"';
      c.textAlign = 'right';
      c.fillText('Rendered by FrameForge · No React required', CR, 1050);
    }

    function drawLine(ctx, pts, progress) {
      var totalLen = 0;
      for (var i = 1; i < pts.length; i++) totalLen += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
      var drawLen = totalLen * progress, drawn = 0;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (var i = 1; i < pts.length; i++) {
        var sl = Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
        if (drawn + sl <= drawLen) { ctx.lineTo(pts[i].x, pts[i].y); drawn += sl; }
        else { var f = (drawLen-drawn)/sl; ctx.lineTo(pts[i-1].x+(pts[i].x-pts[i-1].x)*f, pts[i-1].y+(pts[i].y-pts[i-1].y)*f); break; }
      }
      ctx.stroke();
    }

    function update() {
      var t = performance.now() / 1000;
      gf++; if (gf % 4 === 0) grain();
      draw(t);
      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
