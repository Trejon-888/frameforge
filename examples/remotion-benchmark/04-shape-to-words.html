<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #fafafa; font-family: 'Inter', system-ui; }
    canvas#main { position: absolute; top: 0; left: 0; z-index: 1; }
    canvas#grain { position: absolute; top: 0; left: 0; z-index: 10; mix-blend-mode: multiply; opacity: 0.03; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="main" width="1920" height="1080"></canvas>
  <canvas id="grain" width="1920" height="1080"></canvas>

  <script>
    var c = document.getElementById('main').getContext('2d');
    var gc = document.getElementById('grain').getContext('2d');

    // --- Config ---
    var word = 'FRAMEFORGE';
    var shapeColors = ['#6366f1', '#e94560', '#22c55e', '#f59e0b', '#3b82f6', '#ec4899', '#8b5cf6', '#14b8a6', '#f97316', '#06b6d4'];

    // Shape types for each letter position
    var shapeTypes = ['pentagon', 'triangle', 'square', 'circle', 'hexagon', 'diamond', 'circle', 'triangle', 'square', 'pentagon'];

    var numItems = word.length;
    var spacing = 140;
    var startX = 960 - (numItems - 1) * spacing / 2;
    var centerY = 540;
    var shapeSize = 40;

    // --- Easing ---
    function spring(t) { if(t<=0)return 0;if(t>=1)return 1;return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1; }
    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
    function bounce(t) { if(t<=0)return 0;if(t>=1)return 1;var n1=7.5625,d1=2.75;if(t<1/d1)return n1*t*t;if(t<2/d1)return n1*(t-=1.5/d1)*t+0.75;if(t<2.5/d1)return n1*(t-=2.25/d1)*t+0.9375;return n1*(t-=2.625/d1)*t+0.984375; }

    // --- Grid pattern ---
    function drawGrid(alpha) {
      c.strokeStyle = 'rgba(0,0,0,' + (alpha * 0.04) + ')';
      c.lineWidth = 1;
      for (var x = 0; x < 1920; x += 40) {
        c.beginPath(); c.moveTo(x, 0); c.lineTo(x, 1080); c.stroke();
      }
      for (var y = 0; y < 1080; y += 40) {
        c.beginPath(); c.moveTo(0, y); c.lineTo(1920, y); c.stroke();
      }
    }

    // --- Draw shapes ---
    function drawShape(type, x, y, size, rotation, color, alpha) {
      c.save();
      c.translate(x, y);
      c.rotate(rotation);
      c.globalAlpha = alpha;
      c.fillStyle = color;

      switch(type) {
        case 'circle':
          c.beginPath(); c.arc(0, 0, size, 0, Math.PI*2); c.fill(); break;
        case 'square':
          c.fillRect(-size, -size, size*2, size*2); break;
        case 'triangle':
          c.beginPath(); c.moveTo(0, -size*1.2); c.lineTo(size*1.1, size*0.8); c.lineTo(-size*1.1, size*0.8); c.closePath(); c.fill(); break;
        case 'diamond':
          c.beginPath(); c.moveTo(0, -size*1.3); c.lineTo(size, 0); c.lineTo(0, size*1.3); c.lineTo(-size, 0); c.closePath(); c.fill(); break;
        case 'pentagon':
          c.beginPath();
          for(var i=0;i<5;i++){var a=-Math.PI/2+i*Math.PI*2/5;c.lineTo(Math.cos(a)*size,Math.sin(a)*size);}
          c.closePath(); c.fill(); break;
        case 'hexagon':
          c.beginPath();
          for(var i=0;i<6;i++){var a=i*Math.PI/3;c.lineTo(Math.cos(a)*size,Math.sin(a)*size);}
          c.closePath(); c.fill(); break;
      }
      c.restore();
      c.globalAlpha = 1;
    }

    // --- Draw letter ---
    function drawLetter(char, x, y, size, alpha, color) {
      c.globalAlpha = alpha;
      c.fillStyle = color;
      c.font = '900 ' + size + 'px "Inter"';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText(char, x, y);
      c.globalAlpha = 1;
    }

    // --- Ghost trail ---
    var trails = [];

    // --- Grain ---
    var gf = 0;
    function grain() {
      var img = gc.createImageData(480, 270);
      var d = img.data;
      for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
      gc.save();gc.scale(4,4);gc.putImageData(img,0,0);gc.restore();
    }

    /*
      Timeline (10s):
      0-2s:   Shapes idle with breathing animation
      2-3.5s: Shapes jump up, spin 180°, morph into letters
      3.5-5s: Letters settle, FF logo flies in from left
      5-7s:   Logo snaps into place, does 360° spin
      7-10s:  Logo wipes across, each letter vanishes as it passes
    */

    function update() {
      var t = performance.now() / 1000;
      gf++; if(gf%4===0) grain();

      // Background
      c.fillStyle = '#fafafa';
      c.fillRect(0, 0, 1920, 1080);
      drawGrid(ease(Math.min(1, t / 1.0)));

      // --- Phase 1: Shapes breathing (0-2s) ---
      if (t < 3.5) {
        for (var i = 0; i < numItems; i++) {
          var x = startX + i * spacing;
          var breathe = 1 + Math.sin(t * 2 + i * 0.5) * 0.08;
          var rot = Math.sin(t * 1.5 + i * 0.7) * 0.1;

          // Jump phase (2-3.5s)
          var jumpY = 0;
          var jumpRot = rot;
          var morphProgress = 0;

          if (t > 2.0) {
            var jt = (t - 2.0 - i * 0.06);
            if (jt > 0) {
              var jumpP = Math.min(1, jt / 0.4);
              // Parabolic jump
              jumpY = -250 * Math.sin(jumpP * Math.PI);
              // Spin 180 during jump
              jumpRot = jumpP * Math.PI;
              // Morph from shape to letter
              morphProgress = ease(Math.min(1, Math.max(0, (jt - 0.2) / 0.4)));

              // Ghost trail during jump
              if (jumpP > 0.1 && jumpP < 0.9) {
                c.globalAlpha = 0.1;
                drawShape(shapeTypes[i], x, centerY + jumpY + 30, shapeSize * breathe * 0.8, jumpRot, shapeColors[i], 0.15);
                c.globalAlpha = 1;
              }
            }
          }

          // Draw shape (fading out during morph)
          if (morphProgress < 1) {
            drawShape(shapeTypes[i], x, centerY + jumpY, shapeSize * breathe, jumpRot, shapeColors[i], 1 - morphProgress);
          }

          // Draw letter (fading in during morph)
          if (morphProgress > 0) {
            var letterSize = 80 + 20 * spring(morphProgress);
            drawLetter(word[i], x, centerY + jumpY, letterSize, morphProgress, shapeColors[i]);
          }
        }
      }

      // --- Phase 2: Letters settled (3.5-7s) ---
      if (t >= 3.5 && t < 10) {
        for (var i = 0; i < numItems; i++) {
          var x = startX + i * spacing;
          var settleP = spring(Math.min(1, (t - 3.5 - i * 0.03) / 0.3));

          // Wipe phase: letters vanish as logo passes (7-10s)
          var letterAlpha = 1;
          if (t > 7.0) {
            var logoX = -200 + ((t - 7.0) / 2.5) * 2200;
            if (logoX > x - 60) {
              letterAlpha = Math.max(0, 1 - ease(Math.min(1, (logoX - x + 60) / 80)));
            }
          }

          if (letterAlpha > 0) {
            // Small bounce on settle
            var bounceY = (1 - settleP) * -20;
            drawLetter(word[i], x, centerY + bounceY, 100, letterAlpha, shapeColors[i]);
          }
        }

        // --- FF Logo ---
        var logoEnterP = spring(Math.min(1, Math.max(0, (t - 4.0) / 0.6)));

        if (t >= 4.0) {
          var logoBaseX;
          var logoRot = 0;

          if (t < 5.5) {
            // Flying in from left
            logoBaseX = -100 + logoEnterP * (startX - 100);
          } else if (t < 7.0) {
            // Snapped in place, doing 360 spin
            logoBaseX = startX - 100;
            var spinP = ease(Math.min(1, (t - 5.5) / 1.0));
            logoRot = spinP * Math.PI * 2;
          } else {
            // Wiping across screen
            logoBaseX = -200 + ((t - 7.0) / 2.5) * 2200;
            logoRot = 0;
          }

          // Draw logo
          c.save();
          c.translate(logoBaseX, centerY);
          c.rotate(logoRot);

          // Logo background circle
          c.fillStyle = '#6366f1';
          c.beginPath();
          c.arc(0, 0, 45, 0, Math.PI * 2);
          c.fill();

          // FF text
          c.fillStyle = '#fff';
          c.font = '900 36px "Inter"';
          c.textAlign = 'center';
          c.textBaseline = 'middle';
          c.fillText('FF', 0, 0);

          c.restore();
        }
      }

      // --- Watermark ---
      if (t > 8) {
        c.globalAlpha = ease(Math.min(1, (t - 8) / 0.5)) * 0.2;
        c.fillStyle = '#000';
        c.font = '500 14px "Inter"';
        c.textAlign = 'center';
        c.fillText('Rendered by FrameForge — No React, No Remotion', 960, 1040);
        c.globalAlpha = 1;
      }

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
