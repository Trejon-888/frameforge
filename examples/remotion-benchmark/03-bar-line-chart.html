<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #1A1A2E; font-family: 'Inter', system-ui; }
    canvas#chart { position: absolute; top: 0; left: 0; z-index: 1; }
    canvas#grain { position: absolute; top: 0; left: 0; z-index: 10; mix-blend-mode: overlay; opacity: 0.06; pointer-events: none; }
    .content { position: relative; z-index: 5; }

    .title-area {
      position: absolute; top: 40px; left: 80px;
    }
    .chart-title {
      font-size: 36px; font-weight: 700; color: #fff; opacity: 0;
    }
    .chart-sub {
      font-size: 16px; color: rgba(255,255,255,0.4); margin-top: 6px; opacity: 0;
    }

    .legend {
      position: absolute; top: 48px; right: 80px; display: flex; gap: 24px; opacity: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: rgba(255,255,255,0.6); }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    .dot-bar { background: #6366f1; }
    .dot-line { background: #0B84F3; }

    .watermark {
      position: absolute; bottom: 20px; right: 30px;
      font-family: 'Space Mono'; font-size: 12px; color: rgba(255,255,255,0.15); opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="chart" width="1920" height="1080"></canvas>
  <canvas id="grain" width="1920" height="1080"></canvas>

  <div class="content">
    <div class="title-area">
      <div class="chart-title" id="ct">Monthly Revenue & Conversion Rate</div>
      <div class="chart-sub" id="cs">Jan – Jun 2026 · USD thousands</div>
    </div>
    <div class="legend" id="legend">
      <div class="legend-item"><div class="legend-dot dot-bar"></div>Revenue ($K)</div>
      <div class="legend-item"><div class="legend-dot dot-line"></div>Conversion Rate (%)</div>
    </div>
    <div class="watermark" id="wm">FrameForge Benchmark — remotion.dev/prompts comparison</div>
  </div>

  <script>
    var ctx = document.getElementById('chart').getContext('2d');
    var grainC = document.getElementById('grain').getContext('2d');

    // Data from Remotion prompt
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    var revenue = [8, 12, 10, 15, 18, 22]; // $K
    var conversion = [2.1, 2.8, 2.5, 3.2, 3.8, 4.2]; // %
    var maxRev = 26;
    var maxConv = 5;

    var chartL = 160, chartR = 1760, chartT = 160, chartB = 920;
    var chartW = chartR - chartL, chartH = chartB - chartT;
    var barW = 100, barGap = (chartW - barW * 6) / 7;

    var gf = 0;
    function renderGrain() {
      var img = grainC.createImageData(480, 270);
      var d = img.data;
      for (var i = 0; i < d.length; i += 4) { var v = Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      grainC.save(); grainC.scale(4,4); grainC.putImageData(img, 0, 0); grainC.restore();
    }

    function spring(t) {
      if (t<=0) return 0; if (t>=1) return 1;
      return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1;
    }
    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

    function drawChart(t) {
      ctx.clearRect(0, 0, 1920, 1080);

      // Background
      var grd = ctx.createLinearGradient(0, 0, 0, 1080);
      grd.addColorStop(0, '#1A1A2E');
      grd.addColorStop(1, '#16162A');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, 1920, 1080);

      // Grid
      var gridA = ease(Math.min(1, (t-0.3)/0.5));
      ctx.strokeStyle = 'rgba(255,255,255,' + (gridA * 0.05) + ')';
      ctx.lineWidth = 1;
      for (var g = 0; g <= 5; g++) {
        var gy = chartB - (g/5) * chartH;
        ctx.beginPath(); ctx.moveTo(chartL, gy); ctx.lineTo(chartR, gy); ctx.stroke();
      }

      // Y-axis labels (left: revenue)
      ctx.fillStyle = 'rgba(255,255,255,' + (gridA * 0.3) + ')';
      ctx.font = '500 13px "Space Mono"';
      ctx.textAlign = 'right';
      for (var g = 0; g <= 5; g++) {
        var gy = chartB - (g/5) * chartH;
        ctx.fillText('$' + (g * maxRev/5).toFixed(0) + 'K', chartL - 16, gy + 4);
      }

      // Y-axis labels (right: conversion)
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(11,132,243,' + (gridA * 0.4) + ')';
      for (var g = 0; g <= 5; g++) {
        var gy = chartB - (g/5) * chartH;
        ctx.fillText((g * maxConv/5).toFixed(1) + '%', chartR + 16, gy + 4);
      }

      // Bars — sequential spring animation with slight overlap
      for (var i = 0; i < 6; i++) {
        var barDelay = 0.8 + i * 0.15;
        var barP = spring(Math.min(1, Math.max(0, (t - barDelay) / 0.4)));
        var barH = (revenue[i] / maxRev) * chartH * barP;
        var barX = chartL + barGap + i * (barW + barGap);
        var barY = chartB - barH;

        // Bar gradient
        var bGrd = ctx.createLinearGradient(barX, barY, barX, chartB);
        bGrd.addColorStop(0, '#818cf8');
        bGrd.addColorStop(1, '#6366f1');
        ctx.fillStyle = bGrd;

        // Rounded top
        var r = 6;
        ctx.beginPath();
        ctx.moveTo(barX, chartB);
        ctx.lineTo(barX, barY + r);
        ctx.quadraticCurveTo(barX, barY, barX + r, barY);
        ctx.lineTo(barX + barW - r, barY);
        ctx.quadraticCurveTo(barX + barW, barY, barX + barW, barY + r);
        ctx.lineTo(barX + barW, chartB);
        ctx.closePath();
        ctx.fill();

        // Value on top
        if (barP > 0.7) {
          ctx.fillStyle = 'rgba(255,255,255,' + ease((barP-0.7)*3.33) + ')';
          ctx.font = '700 16px "Space Mono"';
          ctx.textAlign = 'center';
          ctx.fillText('$' + revenue[i] + 'K', barX + barW/2, barY - 12);
        }

        // Month label
        ctx.fillStyle = 'rgba(255,255,255,' + (gridA * 0.4) + ')';
        ctx.font = '600 14px "Inter"';
        ctx.textAlign = 'center';
        ctx.fillText(months[i], barX + barW/2, chartB + 28);
      }

      // Line chart — progressive drawing with glow
      var lineDelay = 1.8;
      var lineP = ease(Math.min(1, Math.max(0, (t - lineDelay) / 1.0)));
      if (lineP > 0) {
        var points = [];
        for (var i = 0; i < 6; i++) {
          var px = chartL + barGap + i * (barW + barGap) + barW/2;
          var py = chartB - (conversion[i] / maxConv) * chartH;
          points.push({ x: px, y: py });
        }

        // Glow
        ctx.strokeStyle = 'rgba(11,132,243,0.15)';
        ctx.lineWidth = 12;
        ctx.lineJoin = 'round';
        drawPartialLine(ctx, points, lineP);

        // Main line
        ctx.strokeStyle = '#0B84F3';
        ctx.lineWidth = 3;
        drawPartialLine(ctx, points, lineP);

        // Dots with pulse
        for (var i = 0; i < points.length; i++) {
          var dotP = ease(Math.min(1, Math.max(0, (t - lineDelay - 0.15 - i*0.12)/0.3)));
          var segProgress = i / (points.length - 1);
          if (segProgress > lineP) continue;

          if (dotP > 0) {
            // Pulse glow
            var pulse = 1 + Math.sin(t * 3 + i) * 0.2;
            ctx.fillStyle = 'rgba(11,132,243,0.2)';
            ctx.beginPath();
            ctx.arc(points[i].x, points[i].y, 12 * pulse * dotP, 0, Math.PI*2);
            ctx.fill();

            // Dot
            ctx.fillStyle = '#0B84F3';
            ctx.beginPath();
            ctx.arc(points[i].x, points[i].y, 5 * dotP, 0, Math.PI*2);
            ctx.fill();

            // White center
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(points[i].x, points[i].y, 2 * dotP, 0, Math.PI*2);
            ctx.fill();

            // Conversion label
            if (dotP > 0.5) {
              ctx.fillStyle = 'rgba(11,132,243,' + ease((dotP-0.5)*2) + ')';
              ctx.font = '700 13px "Space Mono"';
              ctx.textAlign = 'center';
              ctx.fillText(conversion[i] + '%', points[i].x, points[i].y - 18);
            }
          }
        }
      }

      // Axes
      ctx.strokeStyle = 'rgba(255,255,255,' + (gridA * 0.15) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(chartL, chartT); ctx.lineTo(chartL, chartB); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(chartL, chartB); ctx.lineTo(chartR, chartB); ctx.stroke();
    }

    function drawPartialLine(ctx, points, progress) {
      var totalLen = 0;
      for (var i = 1; i < points.length; i++) {
        totalLen += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
      }
      var drawLen = totalLen * progress;
      var drawn = 0;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (var i = 1; i < points.length; i++) {
        var segLen = Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
        if (drawn + segLen <= drawLen) {
          ctx.lineTo(points[i].x, points[i].y);
          drawn += segLen;
        } else {
          var frac = (drawLen - drawn) / segLen;
          ctx.lineTo(
            points[i-1].x + (points[i].x - points[i-1].x) * frac,
            points[i-1].y + (points[i].y - points[i-1].y) * frac
          );
          break;
        }
      }
      ctx.stroke();
    }

    function update() {
      var t = performance.now() / 1000;
      gf++; if (gf % 4 === 0) renderGrain();

      drawChart(t);

      document.getElementById('ct').style.opacity = ease(Math.min(1, t/0.5));
      document.getElementById('cs').style.opacity = ease(Math.min(1, (t-0.2)/0.4));
      document.getElementById('legend').style.opacity = ease(Math.min(1, (t-0.4)/0.4));
      document.getElementById('wm').style.opacity = ease(Math.min(1, (t-3.5)/0.4));

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
