<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
    canvas { position: absolute; top: 0; left: 0; }
    #bg { z-index: 0; }
    #trails { z-index: 1; }
    #particles { z-index: 2; }
    #glow { z-index: 3; mix-blend-mode: screen; }
    #overlay { z-index: 4; }
    #grain { z-index: 10; mix-blend-mode: overlay; opacity: 0.05; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="bg" width="1920" height="1080"></canvas>
  <canvas id="trails" width="1920" height="1080"></canvas>
  <canvas id="particles" width="1920" height="1080"></canvas>
  <canvas id="glow" width="1920" height="1080"></canvas>
  <canvas id="overlay" width="1920" height="1080"></canvas>
  <canvas id="grain" width="1920" height="1080"></canvas>

  <script>
    var bgC = document.getElementById('bg').getContext('2d');
    var trC = document.getElementById('trails').getContext('2d');
    var pC = document.getElementById('particles').getContext('2d');
    var glC = document.getElementById('glow').getContext('2d');
    var oC = document.getElementById('overlay').getContext('2d');
    var gC = document.getElementById('grain').getContext('2d');

    // === SAMPLE TEXT INTO PIXEL TARGETS ===
    function sampleText(text, fontSize, offY) {
      var tc = document.createElement('canvas');
      tc.width = 1920; tc.height = 1080;
      var ctx = tc.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.font = '900 ' + fontSize + 'px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 960, 540 + offY);
      var data = ctx.getImageData(0, 0, 1920, 1080).data;
      var pts = [];
      var step = fontSize > 100 ? 5 : 8;
      for (var y = 0; y < 1080; y += step) {
        for (var x = 0; x < 1920; x += step) {
          if (data[(y * 1920 + x) * 4 + 3] > 128) pts.push({ x: x, y: y });
        }
      }
      return pts;
    }

    var mainPts = sampleText('FRAMEFORGE', 170, -50);
    var subPts = sampleText('Code your video. Frame by frame.', 34, 70);

    // === PARTICLES — start from center explosion ===
    var NUM = mainPts.length + subPts.length;
    var P = [];
    for (var i = 0; i < NUM; i++) {
      var isMain = i < mainPts.length;
      var tgt = isMain ? mainPts[i] : subPts[i - mainPts.length];
      // START FROM CENTER — big bang outward
      var angle = Math.random() * Math.PI * 2;
      var speed = 150 + Math.random() * 400;
      P.push({
        x: 960, y: 540,
        tx: tgt.x, ty: tgt.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: isMain ? (1.2 + Math.random() * 2.5) : (0.8 + Math.random() * 1.5),
        isMain: isMain,
        hue: isMain ? (345 + Math.random() * 35) : (210 + Math.random() * 50),
        delay: Math.random() * 0.8,
        trail: [],
      });
    }

    // Noise
    function noise(x, y, t) {
      return Math.sin(x*0.003+t)*Math.cos(y*0.004-t*0.7) + Math.sin((x+y)*0.002+t*1.3)*0.5;
    }

    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

    // Camera shake state
    var shakeX = 0, shakeY = 0;

    // Grain
    var gf = 0;
    function grain() {
      var img = gC.createImageData(480, 270);
      var d = img.data;
      for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
      gC.save();gC.scale(4,4);gC.putImageData(img,0,0);gC.restore();
    }

    /*
      Timeline (12s):
      0-0.5s:  Flash — particles explode FROM CENTER outward
      0.5-1.5s: Particles drift in flow field (dense cloud)
      1.5-4.5s: Particles converge into FRAMEFORGE with trails
      4.5-7s:  Text formed, color wave pulses through letters
      7-8.5s:  Subtitle converges
      8.5-10s: Full display, ambient breathing
      10-11s:  Camera shake + explosion outward
      11-12s:  Fade to black
    */

    var prevT = 0;

    function update() {
      var t = performance.now() / 1000;
      var dt = Math.min(t - prevT, 0.04);
      prevT = t;
      gf++; if (gf%5===0) grain();

      // === CAMERA SHAKE ===
      if (t > 10.0 && t < 11.0) {
        var shakeIntensity = 15 * (1 - (t - 10) / 1.0);
        shakeX = (Math.random() - 0.5) * shakeIntensity;
        shakeY = (Math.random() - 0.5) * shakeIntensity;
      } else if (t < 0.3) {
        // Initial flash shake
        shakeX = (Math.random()-0.5) * 8 * (0.3-t)/0.3;
        shakeY = (Math.random()-0.5) * 8 * (0.3-t)/0.3;
      } else {
        shakeX *= 0.9; shakeY *= 0.9;
      }

      // === BACKGROUND ===
      bgC.save(); bgC.translate(shakeX, shakeY);

      // Initial flash
      if (t < 0.4) {
        var flashA = Math.max(0, 1 - t/0.4);
        bgC.fillStyle = 'rgba(233,69,96,' + (flashA * 0.3) + ')';
        bgC.fillRect(-20, -20, 1960, 1120);
      }

      // Deep gradient
      var grd = bgC.createRadialGradient(
        960 + Math.sin(t*0.15)*150, 540 + Math.cos(t*0.12)*80, 50,
        960, 540, 1100
      );
      grd.addColorStop(0, t < 0.5 ? '#2a0a2e' : '#120818');
      grd.addColorStop(0.3, '#0a0612');
      grd.addColorStop(1, '#03020a');
      bgC.fillStyle = grd;
      bgC.fillRect(-20, -20, 1960, 1120);

      // Ambient glow pulsing where text will be
      if (t > 2.0 && t < 11) {
        var glowPulse = 0.5 + Math.sin(t * 1.5) * 0.3;
        var glowA = ease(Math.min(1,(t-2)/2)) * 0.04 * glowPulse;
        if (t > 10) glowA *= Math.max(0, (11-t));
        bgC.fillStyle = 'rgba(233,69,96,' + glowA + ')';
        bgC.beginPath();
        bgC.ellipse(960, 490, 600, 120, 0, 0, Math.PI*2);
        bgC.fill();
      }
      bgC.restore();

      // === TRAILS (fade slowly) ===
      trC.fillStyle = 'rgba(3,2,10,0.15)';
      trC.fillRect(0, 0, 1920, 1080);

      // === PARTICLES ===
      pC.clearRect(0, 0, 1920, 1080);
      pC.save(); pC.translate(shakeX, shakeY);

      var convergeStart = 1.5;
      var subStart = 7.0;
      var explodeStart = 10.0;
      var fadeStart = 11.0;

      for (var i = 0; i < P.length; i++) {
        var p = P[i];
        var et = t - p.delay * 0.3;

        var converging = false;
        var exploding = t > explodeStart;
        if (p.isMain && et > convergeStart) converging = true;
        if (!p.isMain && et > subStart) converging = true;
        if (exploding) converging = false;

        if (exploding) {
          var dx = p.x - 960, dy = p.y - 540;
          var dist = Math.sqrt(dx*dx+dy*dy) || 1;
          p.vx += (dx/dist) * 1200 * dt;
          p.vy += (dy/dist) * 1200 * dt;
        } else if (converging) {
          var cP = p.isMain
            ? ease(Math.min(1, (et-convergeStart)/2.5))
            : ease(Math.min(1, (et-subStart)/1.5));

          var stiff = 1.5 + cP * 8;
          var damp = 2.5 + cP * 5;
          p.vx += (p.tx - p.x) * stiff * dt;
          p.vy += (p.ty - p.y) * stiff * dt;
          p.vx *= (1 - damp * dt);
          p.vy *= (1 - damp * dt);

          // Breathing when settled
          if (cP > 0.85) {
            p.vx += Math.sin(t*2.5 + i*0.05) * 3 * dt;
            p.vy += Math.cos(t*2 + i*0.07) * 3 * dt;
          }
        } else {
          // Flow field
          var n = noise(p.x, p.y, t * 0.8);
          var a = n * Math.PI * 2;
          p.vx += Math.cos(a) * 40 * dt;
          p.vy += Math.sin(a) * 40 * dt;
          p.vx *= 0.97; p.vy *= 0.97;
          // Gentle center pull
          p.vx += (960-p.x)*0.15*dt;
          p.vy += (540-p.y)*0.15*dt;
        }

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        // Trail
        if (converging && !exploding) {
          trC.fillStyle = 'hsla(' + p.hue + ',80%,50%,0.04)';
          trC.fillRect(p.x-1, p.y-1, 2, 2);
        }

        // Visibility
        var alpha = 1;
        if (t > fadeStart) alpha = Math.max(0, 1-(t-fadeStart)/1.0);
        if (alpha <= 0) continue;

        // Color wave through settled text
        var hue = p.hue;
        if (p.isMain && t > 4.5 && t < 10) {
          var wavePos = (t * 200) % 1920; // color wave sweeps across
          var distToWave = Math.abs(p.tx - wavePos);
          if (distToWave < 150) {
            hue = 45 + (1 - distToWave/150) * 30; // shift to gold near wave
          }
        }

        var sat = p.isMain ? 85 : 65;
        var light = p.isMain ? 60 : 50;

        // Particle dot
        pC.fillStyle = 'hsla(' + hue + ',' + sat + '%,' + light + '%,' + (alpha*0.95) + ')';
        pC.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
      pC.restore();

      // === GLOW LAYER (bloom effect) ===
      glC.clearRect(0, 0, 1920, 1080);
      if (t > 3.0 && t < 11) {
        var bloomA = ease(Math.min(1, (t-3)/1.5));
        if (t > 10) bloomA *= Math.max(0, (11-t));

        // Large soft glow behind text area
        glC.save(); glC.translate(shakeX, shakeY);
        var bloomGrd = glC.createRadialGradient(960, 490, 50, 960, 490, 500);
        bloomGrd.addColorStop(0, 'rgba(233,69,96,' + (bloomA * 0.08) + ')');
        bloomGrd.addColorStop(0.5, 'rgba(99,102,241,' + (bloomA * 0.04) + ')');
        bloomGrd.addColorStop(1, 'rgba(0,0,0,0)');
        glC.fillStyle = bloomGrd;
        glC.fillRect(0, 0, 1920, 1080);

        // Horizontal light streak
        if (t > 4.5) {
          var streakA = bloomA * 0.06 * (0.5 + Math.sin(t*2)*0.5);
          glC.fillStyle = 'rgba(255,200,150,' + streakA + ')';
          glC.fillRect(200, 475, 1520, 3);
        }
        glC.restore();
      }

      // === OVERLAY: connection lines ===
      oC.clearRect(0, 0, 1920, 1080);
      oC.save(); oC.translate(shakeX, shakeY);
      if (t > 4.0 && t < 10.5) {
        var lA = Math.min(0.04, ease(Math.min(1,(t-4)/1)) * 0.04);
        if (t > 9.5) lA *= Math.max(0,(10.5-t));
        oC.strokeStyle = 'rgba(233,69,96,' + lA + ')';
        oC.lineWidth = 0.5;
        for (var i = 0; i < mainPts.length; i += 12) {
          for (var j = i+12; j < mainPts.length; j += 12) {
            var dx = P[i].x-P[j].x, dy = P[i].y-P[j].y;
            if (dx*dx+dy*dy < 2500) {
              oC.beginPath(); oC.moveTo(P[i].x,P[i].y); oC.lineTo(P[j].x,P[j].y); oC.stroke();
            }
          }
        }
      }
      oC.restore();

      // Watermark
      if (t > 8.5 && t < 10.5) {
        var wA = ease(Math.min(1,(t-8.5)/0.5));
        if (t>10) wA *= Math.max(0,(10.5-t)*2);
        oC.globalAlpha = wA * 0.2;
        oC.fillStyle = '#fff';
        oC.font = '400 16px system-ui';
        oC.textAlign = 'center';
        oC.fillText('Canvas particle physics — try this in React.', 960, 1040);
        oC.globalAlpha = 1;
      }

      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
