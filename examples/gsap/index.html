<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #0a0a0a;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 200px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 80px;
      font-weight: 800;
      color: white;
      opacity: 0;
    }

    .subtitle {
      position: absolute;
      top: 320px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 36px;
      font-weight: 300;
      color: #a78bfa;
      opacity: 0;
    }

    .bar {
      position: absolute;
      top: 400px;
      left: 50%;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #a78bfa, #f472b6, #fb923c);
      transform: translateX(-50%);
    }

    .card {
      position: absolute;
      width: 260px;
      height: 160px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: white;
      opacity: 0;
      transform: translateY(80px);
    }

    .card-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); top: 500px; left: 240px; }
    .card-2 { background: linear-gradient(135deg, #ec4899, #f472b6); top: 500px; left: 560px; }
    .card-3 { background: linear-gradient(135deg, #f97316, #fb923c); top: 500px; left: 880px; }
    .card-4 { background: linear-gradient(135deg, #10b981, #34d399); top: 500px; left: 1200px; }
    .card-5 { background: linear-gradient(135deg, #3b82f6, #60a5fa); top: 500px; left: 1520px; }

    .badge {
      position: absolute;
      bottom: 80px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 22px;
      color: rgba(255, 255, 255, 0.3);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="scene">
    <h1 class="title">GSAP Timeline</h1>
    <p class="subtitle">GreenSock Animation Platform + FrameForge</p>
    <div class="bar"></div>
    <div class="card card-1">Render</div>
    <div class="card card-2">Animate</div>
    <div class="card card-3">Capture</div>
    <div class="card card-4">Encode</div>
    <div class="card card-5">Export</div>
    <p class="badge">Deterministic video from any web animation</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // GSAP internally uses requestAnimationFrame, which FrameForge has virtualized.
    // No special integration needed — GSAP animations are automatically deterministic.

    const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

    tl.to(".title", { opacity: 1, y: -20, duration: 1 }, 0.3)
      .to(".subtitle", { opacity: 1, y: -10, duration: 0.8 }, 0.8)
      .to(".bar", { width: 700, duration: 1.2, ease: "power2.inOut" }, 1.0)
      .to(".card", {
        opacity: 1,
        y: 0,
        duration: 0.8,
        stagger: 0.15,
        ease: "back.out(1.7)",
      }, 1.5)
      .to(".badge", { opacity: 1, duration: 1 }, 3.0);
  </script>
</body>
</html>
