<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1440px; height: 2560px; overflow: hidden;
      background: transparent; font-family: 'Inter', system-ui;
    }

    /* Source video fills the canvas */
    video#source {
      position: absolute; top: 0; left: 0;
      width: 1440px; height: 2560px;
      object-fit: cover; z-index: 0;
    }

    /* Overlay container */
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

    /* === NEO-BRUTALIST ELEMENTS (Orange #f97316) === */

    /* Captions at bottom */
    .caption-container {
      position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%);
      max-width: 1200px; text-align: center; z-index: 10;
    }

    .caption-text {
      font-size: 52px; font-weight: 800; color: #fff;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      line-height: 1.3; letter-spacing: -1px;
      opacity: 0;
    }

    .caption-highlight {
      background: #f97316; color: #000; padding: 2px 12px;
      border: 2px solid #000; display: inline;
      box-decoration-break: clone; -webkit-box-decoration-break: clone;
    }

    /* Hook card (top) */
    .hook-card {
      position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
      background: #f97316; border: 3px solid #000; border-radius: 12px;
      padding: 20px 36px; box-shadow: 6px 6px 0 #000;
      font-size: 28px; font-weight: 800; color: #000;
      text-align: center; max-width: 1100px;
      text-transform: uppercase; letter-spacing: 2px;
      opacity: 0; z-index: 10;
    }

    /* Lower third */
    .lower-third {
      position: absolute; bottom: 500px; left: 60px;
      display: flex; align-items: center; gap: 16px;
      opacity: 0; z-index: 10;
      transform: translateX(-40px);
    }

    .lt-bar {
      width: 6px; height: 80px; background: #f97316;
      border: 2px solid #000;
    }

    .lt-info {}

    .lt-name {
      font-size: 40px; font-weight: 900; color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .lt-title {
      font-size: 22px; font-weight: 600; color: #f97316;
      text-shadow: 1px 1px 0 #000;
      margin-top: 2px;
    }

    /* Key point card */
    .key-point {
      position: absolute; top: 180px; right: 60px;
      background: #171e19; border: 3px solid #000;
      border-radius: 12px; padding: 20px 28px;
      box-shadow: 6px 6px 0 #f97316;
      opacity: 0; z-index: 10;
      transform: translateX(40px);
    }

    .kp-label {
      font-size: 13px; font-weight: 700; color: #f97316;
      text-transform: uppercase; letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .kp-text {
      font-size: 32px; font-weight: 800; color: #fff;
    }

    /* Stats callout */
    .stat-callout {
      position: absolute; top: 180px; left: 60px;
      display: flex; gap: 16px;
      opacity: 0; z-index: 10;
    }

    .stat-box {
      background: #f97316; border: 3px solid #000;
      border-radius: 10px; padding: 16px 24px;
      box-shadow: 4px 4px 0 #000; text-align: center;
    }

    .stat-num {
      font-size: 44px; font-weight: 900; color: #000;
      font-family: 'Space Mono', monospace;
    }

    .stat-label {
      font-size: 14px; font-weight: 700; color: #171e19;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Outro */
    .outro {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(23,30,25,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      opacity: 0; z-index: 15;
    }

    .outro-logo {
      font-size: 80px; font-weight: 900;
    }
    .outro-logo .o1 { color: #f97316; }
    .outro-logo .o2 { color: #b7c6c2; }

    .outro-cta {
      background: #f97316; color: #000; border: 3px solid #000;
      border-radius: 12px; padding: 18px 44px;
      font-size: 24px; font-weight: 800;
      box-shadow: 8px 8px 0 #000;
    }

    /* Dot pattern overlay on orange elements */
    .dots-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; z-index: 6;
    }

    /* Top gradient for readability */
    .top-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 400px;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
      z-index: 3;
    }

    /* Bottom gradient for captions */
    .bottom-gradient {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 500px;
      background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
      z-index: 3;
    }
  </style>
</head>
<body>
  <!-- Source video -->
  <video id="source" src="C:/Users/enriq/Videos/Crafting AI Outreach Campaign/clip-7-RAW-building-ai-manager-v1.mp4" muted></video>

  <!-- Gradients for readability -->
  <div class="top-gradient"></div>
  <div class="bottom-gradient"></div>

  <div class="overlay">
    <!-- Hook card (0-7s) -->
    <div class="hook-card" id="hook">🤖 Build Your Own AI Social Media Manager</div>

    <!-- Lower third (9-14s) -->
    <div class="lower-third" id="lt">
      <div class="lt-bar"></div>
      <div class="lt-info">
        <div class="lt-name">Enrique</div>
        <div class="lt-title">Business Development · Infinite X</div>
      </div>
    </div>

    <!-- Key point 1 (15-24s) -->
    <div class="key-point" id="kp1">
      <div class="kp-label">Building</div>
      <div class="kp-text">Agent Workflows<br>& AI Systems</div>
    </div>

    <!-- Key point 2 (25-35s) -->
    <div class="key-point" id="kp2" style="right:auto;left:60px;">
      <div class="kp-label">First-of-its-kind</div>
      <div class="kp-text">AI Client<br>Acquisition System</div>
    </div>

    <!-- Stats (36-49s) -->
    <div class="stat-callout" id="stats">
      <div class="stat-box"><div class="stat-num">50+</div><div class="stat-label">Partners</div></div>
      <div class="stat-box"><div class="stat-num">PE</div><div class="stat-label">Firms</div></div>
      <div class="stat-box"><div class="stat-num">M&A</div><div class="stat-label">Advisory</div></div>
    </div>

    <!-- Captions -->
    <div class="caption-container">
      <div class="caption-text" id="caption"></div>
    </div>

    <!-- Outro (last 2s — won't show since video cuts) -->
  </div>

  <script>
    function ease(t) { t=Math.max(0,Math.min(1,t)); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
    function spring(t) { if(t<=0)return 0;if(t>=1)return 1;return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1; }

    // Caption data from SRT
    var captions = [
      { s: 0.0, e: 8.74, text: 'So you can create your own social media AI agent manager', highlight: 'AI agent manager' },
      { s: 8.88, e: 9.38, text: "What's up, everyone?" },
      { s: 9.8, e: 12.02, text: "Hey, if you're new here, my name is Enrique" },
      { s: 12.4, e: 14.34, text: "My background is in business development" },
      { s: 14.92, e: 21.1, text: "Building agent workflows and AI systems" },
      { s: 21.1, e: 24.06, text: "at Infinite X" },
      { s: 24.98, e: 35.76, text: "We built the first AI client acquisition system for agencies", highlight: 'AI client acquisition' },
      { s: 36.02, e: 50.54, text: "Used by 50+ partners, PE firms, and M&A advisories", highlight: '50+ partners' },
    ];

    var captionEl = document.getElementById('caption');
    var hookEl = document.getElementById('hook');
    var ltEl = document.getElementById('lt');
    var kp1El = document.getElementById('kp1');
    var kp2El = document.getElementById('kp2');
    var statsEl = document.getElementById('stats');

    function update() {
      var t = performance.now() / 1000;

      // === CAPTIONS ===
      var activeCaption = null;
      for (var i = 0; i < captions.length; i++) {
        if (t >= captions[i].s && t <= captions[i].e) {
          activeCaption = captions[i];
          break;
        }
      }

      if (activeCaption) {
        var text = activeCaption.text;
        if (activeCaption.highlight) {
          text = text.replace(activeCaption.highlight, '<span class="caption-highlight">' + activeCaption.highlight + '</span>');
        }
        captionEl.innerHTML = text;
        captionEl.style.opacity = 1;
      } else {
        captionEl.style.opacity = 0;
      }

      // === HOOK CARD (0-7s) ===
      if (t < 7) {
        var hp = spring(Math.min(1, t / 0.4));
        hookEl.style.opacity = hp;
        hookEl.style.transform = 'translateX(-50%) scale(' + (0.9 + 0.1*hp) + ')';
        if (t > 5.5) hookEl.style.opacity = Math.max(0, 1 - (t-5.5)/1.5);
      } else {
        hookEl.style.opacity = 0;
      }

      // === LOWER THIRD (9-14s) ===
      if (t > 9 && t < 14.5) {
        var lp = spring(Math.min(1, (t-9) / 0.5));
        ltEl.style.opacity = lp;
        ltEl.style.transform = 'translateX(' + (-40*(1-lp)) + 'px)';
        if (t > 13) ltEl.style.opacity = Math.max(0, 1 - (t-13)/1.5);
      } else {
        ltEl.style.opacity = 0;
      }

      // === KEY POINT 1 (15-24s) ===
      if (t > 15 && t < 24) {
        var k1p = spring(Math.min(1, (t-15) / 0.5));
        kp1El.style.opacity = k1p;
        kp1El.style.transform = 'translateX(' + (40*(1-k1p)) + 'px)';
        if (t > 22.5) kp1El.style.opacity = Math.max(0, 1 - (t-22.5)/1.5);
      } else {
        kp1El.style.opacity = 0;
      }

      // === KEY POINT 2 (25-35s) ===
      if (t > 25 && t < 35.5) {
        var k2p = spring(Math.min(1, (t-25) / 0.5));
        kp2El.style.opacity = k2p;
        kp2El.style.transform = 'translateX(' + (-40*(1-k2p)) + 'px)';
        if (t > 34) kp2El.style.opacity = Math.max(0, 1 - (t-34)/1.5);
      } else {
        kp2El.style.opacity = 0;
      }

      // === STATS (36-49s) ===
      if (t > 36 && t < 49) {
        var sp = spring(Math.min(1, (t-36) / 0.5));
        statsEl.style.opacity = sp;
        // Animate individual stat boxes
        var boxes = statsEl.querySelectorAll('.stat-box');
        for (var j = 0; j < boxes.length; j++) {
          var bp = spring(Math.min(1, Math.max(0, (t - 36.2 - j*0.15) / 0.4)));
          boxes[j].style.transform = 'translateY(' + (30*(1-bp)) + 'px)';
          boxes[j].style.opacity = bp;
        }
        if (t > 47) statsEl.style.opacity = Math.max(0, 1 - (t-47)/2);
      } else {
        statsEl.style.opacity = 0;
      }

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
