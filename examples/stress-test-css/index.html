<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #0a0a0a; font-family: system-ui;
    }

    /* Stress test: many simultaneous CSS animations */

    @keyframes orbit {
      0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes text-reveal {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0% 0 0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* Background gradient */
    .bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(-45deg, #0a0a2e, #1a0a2e, #0a1a2e, #0a0a3e);
      background-size: 400% 400%;
      animation: gradient-shift 8s ease infinite;
    }

    /* Center hub */
    .hub {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .hub-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #6366f1, #4338ca);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Orbiting dots */
    .orbit-container {
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0;
    }

    .orbiter {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      top: -8px; left: -8px;
      animation: orbit linear infinite;
    }

    .o1 { background: #e94560; animation-duration: 3s; }
    .o2 { background: #f97316; animation-duration: 4s; animation-delay: -1s; }
    .o3 { background: #10b981; animation-duration: 5s; animation-delay: -2s; }
    .o4 { background: #3b82f6; animation-duration: 3.5s; animation-delay: -0.5s; }
    .o5 { background: #8b5cf6; animation-duration: 4.5s; animation-delay: -1.5s; }
    .o6 { background: #ec4899; animation-duration: 6s; animation-delay: -3s; }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: float ease-in-out infinite;
    }

    .p1 { top: 20%; left: 15%; animation-duration: 3s; }
    .p2 { top: 70%; left: 80%; animation-duration: 4s; animation-delay: -1s; }
    .p3 { top: 30%; left: 70%; animation-duration: 3.5s; animation-delay: -2s; }
    .p4 { top: 80%; left: 25%; animation-duration: 4.5s; animation-delay: -0.5s; }
    .p5 { top: 50%; left: 90%; animation-duration: 3s; animation-delay: -1.5s; }
    .p6 { top: 10%; left: 50%; animation-duration: 5s; animation-delay: -2.5s; }
    .p7 { top: 60%; left: 40%; animation-duration: 3.5s; animation-delay: -1s; }
    .p8 { top: 40%; left: 10%; animation-duration: 4s; animation-delay: -3s; }

    /* Title with reveal */
    .title {
      position: absolute; top: 180px; width: 100%; text-align: center;
      font-size: 56px; font-weight: 900; color: white;
      animation: text-reveal 1.5s ease-out 0.5s both;
    }

    .subtitle {
      position: absolute; top: 260px; width: 100%; text-align: center;
      font-size: 24px; color: rgba(255,255,255,0.5);
      animation: text-reveal 1.5s ease-out 1s both;
    }

    /* Counter using CSS + JS */
    .counter {
      position: absolute; bottom: 100px; width: 100%; text-align: center;
      font-size: 18px; color: rgba(255,255,255,0.3);
      font-family: 'Courier New', monospace;
    }

    /* Multiple bars with staggered widths */
    .bars {
      position: absolute; bottom: 160px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px;
    }

    .bar {
      height: 6px; border-radius: 3px;
      animation: bar-grow ease-out both;
    }

    @keyframes bar-grow {
      0% { width: 0; }
      100% { width: var(--target-width); }
    }

    .bar:nth-child(1) { background: #6366f1; --target-width: 400px; animation-duration: 1s; animation-delay: 2s; }
    .bar:nth-child(2) { background: #e94560; --target-width: 300px; animation-duration: 1s; animation-delay: 2.2s; }
    .bar:nth-child(3) { background: #10b981; --target-width: 350px; animation-duration: 1s; animation-delay: 2.4s; }
    .bar:nth-child(4) { background: #f97316; --target-width: 250px; animation-duration: 1s; animation-delay: 2.6s; }
    .bar:nth-child(5) { background: #3b82f6; --target-width: 380px; animation-duration: 1s; animation-delay: 2.8s; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <h1 class="title">CSS Stress Test</h1>
  <p class="subtitle">20+ simultaneous CSS animations</p>

  <div class="orbit-container">
    <div class="orbiter o1"></div>
    <div class="orbiter o2"></div>
    <div class="orbiter o3"></div>
    <div class="orbiter o4"></div>
    <div class="orbiter o5"></div>
    <div class="orbiter o6"></div>
  </div>

  <div class="hub">
    <div class="hub-circle"></div>
  </div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <div class="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="counter" id="counter"></div>

  <script>
    // Mix JS animation with CSS animations
    function update() {
      var t = performance.now() / 1000;
      var el = document.getElementById('counter');
      el.textContent = 'Frame: ' + Math.floor(t * 30) + ' | Time: ' + t.toFixed(2) + 's | Animations: ' + document.getAnimations().length;
      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
