<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .canvas {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
      opacity: 0;
    }

    .monogram {
      font-size: 160px;
      font-weight: 900;
      letter-spacing: -8px;
      opacity: 0;
      transform: scale(0.8);
    }
    .monogram .f1 {
      background: linear-gradient(135deg, #e94560, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .monogram .f2 {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .cta-text {
      font-size: 40px; font-weight: 300; color: rgba(255,255,255,0.6);
      opacity: 0; letter-spacing: 1px;
    }

    .bar {
      width: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #e94560, #6366f1, transparent);
    }

    .install-cmd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: #34d399;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 12px 32px;
      border-radius: 8px;
      opacity: 0;
    }
    .install-cmd .prompt { color: #6b7280; }

    .github {
      font-size: 18px; color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0; margin-top: 8px;
    }

    .license {
      position: absolute; bottom: 40px;
      font-size: 13px; color: rgba(255,255,255,0.15);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-gradient"></div>

    <div class="monogram"><span class="f1">F</span><span class="f2">F</span></div>
    <p class="cta-text">Code your video. Frame by frame.</p>
    <div class="bar"></div>
    <div class="install-cmd"><span class="prompt">$</span> npm install @frameforge/core @frameforge/sdk</div>
    <p class="github">github.com/Trejon-888/frameforge</p>
    <p class="license">MIT License — Free & Open Source</p>
  </div>

  <script>
    const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    // Spring easing for the monogram
    const spring = t => {
      const c4 = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 :
        Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
    };

    function update() {
      const t = performance.now() / 1000;

      // Background gradient
      document.querySelector('.bg-gradient').style.opacity =
        Math.min(1, Math.max(0, (t - 0.1) / 1.0));

      // Monogram FF with spring
      const mono = document.querySelector('.monogram');
      const mp = spring(Math.min(1, Math.max(0, (t - 0.3) / 0.8)));
      mono.style.opacity = Math.min(1, mp);
      mono.style.transform = `scale(${0.8 + 0.2 * mp})`;

      // CTA text
      document.querySelector('.cta-text').style.opacity =
        Math.min(1, Math.max(0, (t - 1.2) / 0.6));

      // Bar
      const barP = ease(Math.min(1, Math.max(0, (t - 1.6) / 0.8)));
      document.querySelector('.bar').style.width = (barP * 500) + 'px';

      // Install command
      document.querySelector('.install-cmd').style.opacity =
        Math.min(1, Math.max(0, (t - 2.2) / 0.5));

      // GitHub
      document.querySelector('.github').style.opacity =
        Math.min(1, Math.max(0, (t - 2.8) / 0.5));

      // License
      document.querySelector('.license').style.opacity =
        Math.min(1, Math.max(0, (t - 3.2) / 0.5));

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
