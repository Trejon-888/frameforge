<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .canvas {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }

    /* Animated grid background */
    .grid {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0;
    }

    /* Glowing orb behind the logo */
    .glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(233, 69, 96, 0.15) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0;
      transform: scale(0.3);
    }

    /* Floating geometric shapes */
    .geo {
      position: absolute;
      border: 1px solid rgba(99, 102, 241, 0.15);
      opacity: 0;
    }
    .geo-1 { width: 120px; height: 120px; top: 150px; left: 200px; transform: rotate(45deg); }
    .geo-2 { width: 80px; height: 80px; top: 700px; right: 250px; border-radius: 50%; }
    .geo-3 { width: 160px; height: 160px; bottom: 200px; left: 350px; transform: rotate(15deg); border-color: rgba(233, 69, 96, 0.1); }
    .geo-4 { width: 60px; height: 60px; top: 250px; right: 400px; transform: rotate(30deg); }
    .geo-5 { width: 100px; height: 100px; top: 600px; left: 180px; border-radius: 50%; border-color: rgba(139, 92, 246, 0.12); }

    /* Logo */
    .logo-container {
      position: relative;
      z-index: 2;
    }

    .logo-text {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      transform: translateY(30px);
    }

    .logo-accent {
      font-weight: 900;
      background: linear-gradient(135deg, #e94560 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Accent bar */
    .bar {
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #e94560, #6366f1, #8b5cf6);
      margin-top: 16px;
      border-radius: 2px;
    }

    /* Tagline */
    .tagline {
      font-size: 28px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 28px;
      opacity: 0;
      letter-spacing: 1px;
    }

    .tagline em {
      font-style: normal;
      color: #e94560;
      font-weight: 400;
    }

    /* Version badge */
    .version {
      position: absolute;
      bottom: 50px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.2);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="geo geo-1"></div>
    <div class="geo geo-2"></div>
    <div class="geo geo-3"></div>
    <div class="geo geo-4"></div>
    <div class="geo geo-5"></div>

    <div class="logo-container">
      <div class="logo-text">Frame<span class="logo-accent">Forge</span></div>
    </div>
    <div class="bar"></div>
    <p class="tagline">If a browser can render it, <em>FrameForge</em> can record it.</p>
    <p class="version">v0.1.0 — MIT License</p>
  </div>

  <script>
    const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const lerp = (a, b, t) => a + (b - a) * Math.min(1, Math.max(0, t));

    function update() {
      const t = performance.now() / 1000;

      // Grid fade in
      const grid = document.querySelector('.grid');
      grid.style.opacity = lerp(0, 1, ease((t - 0.2) / 1.5));

      // Glow orb
      const glow = document.querySelector('.glow');
      const glowProgress = ease(Math.min(1, Math.max(0, (t - 0.3) / 1.2)));
      glow.style.opacity = glowProgress * 0.8;
      glow.style.transform = `scale(${lerp(0.3, 1.2, glowProgress)})`;

      // Geometric shapes float in
      document.querySelectorAll('.geo').forEach((el, i) => {
        const delay = 0.5 + i * 0.15;
        const p = ease(Math.min(1, Math.max(0, (t - delay) / 1.0)));
        el.style.opacity = p * 0.5;
      });

      // Logo text
      const logo = document.querySelector('.logo-text');
      const logoP = ease(Math.min(1, Math.max(0, (t - 0.8) / 1.0)));
      logo.style.opacity = logoP;
      logo.style.transform = `translateY(${lerp(30, 0, logoP)}px)`;

      // Accent bar
      const bar = document.querySelector('.bar');
      const barP = ease(Math.min(1, Math.max(0, (t - 1.5) / 0.8)));
      bar.style.width = lerp(0, 600, barP) + 'px';

      // Tagline
      const tagline = document.querySelector('.tagline');
      tagline.style.opacity = lerp(0, 1, ease((t - 2.2) / 0.8));

      // Version
      const version = document.querySelector('.version');
      version.style.opacity = lerp(0, 1, ease((t - 3.0) / 0.5));

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
